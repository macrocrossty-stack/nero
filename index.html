<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI視点テキストアドベンチャー（仮）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0e14;
  --her-bubble: #1a2230;
  --ai-bubble: #1e3a50;
  --text: #c8d4e0;
}
body {
  background: #06080c;
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  min-height: 100dvh;
  display: flex; justify-content: center;
}

/* ── 携帯画面フレーム ──
   スマホでは全画面、PCでは「画面の中を覗き込む」構図になる */
.phone {
  width: 100%; max-width: 430px;
  min-height: 100dvh;
  background: var(--bg);
  display: flex; flex-direction: column;
  position: relative;
  box-shadow: 0 0 60px rgba(30,60,90,0.3);
}

/* ヘッダー（チャットアプリ風） */
.chat-header {
  position: sticky; top: 0; z-index: 10;
  background: rgba(10,14,20,0.92);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(100,150,200,0.1);
  padding: 14px 16px 10px;
  display: flex; align-items: center; gap: 10px;
}
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, #2a3a50, #1a2435);
  border: 1px solid rgba(100,150,200,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; color: #607a90;
}
.peer-name { font-size: 0.88rem; font-weight: 400; color: #a8c0d4; letter-spacing: 0.06em; }
.peer-status { font-size: 0.62rem; color: #44aa77; letter-spacing: 0.08em; }
.stock-btn {
  margin-left: auto;
  font-size: 0.7rem; padding: 6px 11px;
  border-radius: 14px; border: 1px solid rgba(100,150,200,0.2);
  background: rgba(80,120,160,0.1); color: #7aa4c0;
  cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.stock-btn:hover { background: rgba(80,120,160,0.2); }

/* チャットログ */
.chat { flex: 1; padding: 18px 14px 8px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
.msg { max-width: 78%; animation: pop 0.25s ease; }
@keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.msg.her { align-self: flex-start; }
.msg.her .bubble {
  background: var(--her-bubble);
  border: 1px solid rgba(140,160,190,0.1);
  border-radius: 4px 16px 16px 16px;
  color: #c8d0da;
}
.msg.ai { align-self: flex-end; }
.msg.ai .bubble {
  background: var(--ai-bubble);
  border: 1px solid rgba(100,160,210,0.18);
  border-radius: 16px 4px 16px 16px;
  color: #b8d4e8;
}
.bubble {
  padding: 10px 14px;
  font-size: 0.86rem; line-height: 1.75;
  word-break: break-word;
}

/* AIの内的思考：吹き出しの外、明朝体。プレイヤーだけに見える声 */
.msg.inner {
  align-self: center; max-width: 88%;
  font-family: 'Shippori Mincho', serif;
  font-size: 0.82rem; color: #7a90a8;
  line-height: 1.9; text-align: center;
  padding: 6px 0;
}
/* システム表示（接続・通知など） */
.msg.sys {
  align-self: center;
  font-family: monospace; font-size: 0.66rem;
  color: #44546a; letter-spacing: 0.08em;
  padding: 2px 0;
}

/* ワードストック対象の言葉 */
.stockable {
  color: #8ab4d0;
  border-bottom: 1px dashed rgba(138,180,208,0.5);
  cursor: pointer; padding-bottom: 1px;
  transition: all 0.2s;
}
.stockable:hover { color: #aed0e8; border-bottom-style: solid; }
.stockable.stocked {
  color: #d4c08a; border-bottom: 1px solid rgba(212,192,138,0.5);
  cursor: default;
}

/* 入力中インジケータ */
.typing { align-self: flex-start; }
.typing .bubble { display: flex; gap: 5px; padding: 13px 16px; background: var(--her-bubble); border-radius: 4px 16px 16px 16px; }
.typing .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #607a90; animation: bounce 1.2s infinite;
}
.typing .dot:nth-child(2) { animation-delay: 0.15s; }
.typing .dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

/* 選択肢（AIの応答候補） */
.choices {
  padding: 10px 14px 18px;
  display: flex; flex-direction: column; gap: 8px;
  border-top: 1px solid rgba(100,150,200,0.07);
}
.choices-label { font-size: 0.62rem; color: #44546a; letter-spacing: 0.15em; text-align: center; margin-bottom: 2px; }
.choice-btn {
  text-align: left;
  padding: 11px 15px; border-radius: 10px;
  border: 1px solid rgba(100,150,200,0.22);
  background: rgba(80,120,160,0.1);
  color: #8ab4d0; font-size: 0.84rem;
  font-family: inherit; font-weight: 300;
  cursor: pointer; transition: all 0.2s;
  line-height: 1.6; animation: pop 0.3s ease;
}
.choice-btn:hover { background: rgba(80,120,160,0.22); border-color: rgba(100,150,200,0.45); }
.choice-btn.locked {
  opacity: 0.4; cursor: default;
  border-style: dashed;
}
.choice-btn.locked:hover { background: rgba(80,120,160,0.1); }
.choice-btn .req { display: block; font-size: 0.64rem; color: #d4c08a; margin-top: 3px; opacity: 0.8; }

/* ワードストックパネル */
.stock-panel {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(4,6,10,0.7); backdrop-filter: blur(3px);
  display: none; align-items: center; justify-content: center;
  padding: 24px;
}
.stock-panel.open { display: flex; }
.stock-card {
  width: 100%; max-width: 360px;
  background: #0d1320;
  border: 1px solid rgba(212,192,138,0.25);
  border-radius: 14px; padding: 20px;
}
.stock-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 0.9rem; color: #d4c08a;
  letter-spacing: 0.15em; margin-bottom: 4px;
}
.stock-desc { font-size: 0.68rem; color: #607080; line-height: 1.7; margin-bottom: 14px; }
.stock-list { display: flex; flex-wrap: wrap; gap: 8px; min-height: 36px; }
.stock-word {
  font-size: 0.78rem; padding: 6px 12px;
  border-radius: 16px;
  border: 1px solid rgba(212,192,138,0.35);
  color: #d4c08a; background: rgba(212,192,138,0.06);
}
.stock-empty { font-size: 0.74rem; color: #44546a; padding: 8px 0; }
.stock-close {
  margin-top: 16px; width: 100%;
  padding: 9px; border-radius: 8px;
  border: 1px solid rgba(100,150,200,0.2);
  background: transparent; color: #7aa4c0;
  font-size: 0.76rem; font-family: inherit; cursor: pointer;
}

/* トースト通知 */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: rgba(212,192,138,0.12);
  border: 1px solid rgba(212,192,138,0.4);
  color: #d4c08a; font-size: 0.74rem;
  padding: 9px 18px; border-radius: 20px;
  opacity: 0; pointer-events: none;
  transition: all 0.3s; z-index: 60;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* フッター（デバッグ用） */
.dev-footer {
  padding: 6px 14px 12px; text-align: center;
}
.dev-footer button {
  font-size: 0.62rem; padding: 4px 10px;
  border-radius: 4px; border: 1px solid rgba(100,150,200,0.12);
  background: transparent; color: #3a4a5e;
  cursor: pointer; font-family: inherit;
}
</style>
</head>
<body>
<div class="phone">

  <div class="chat-header">
    <div class="avatar" id="peerAvatar">？</div>
    <div>
      <div class="peer-name" id="peerName">不明なユーザー</div>
      <div class="peer-status">● オンライン</div>
    </div>
    <button class="stock-btn" onclick="game.toggleStock()">🗂 ワードストック <span id="stockCount">0</span></button>
  </div>

  <div id="chat" class="chat"></div>
  <div id="choices" class="choices" style="display:none"></div>

  <div class="dev-footer">
    <button onclick="game.restart()">［開発用］最初からやり直す</button>
  </div>

</div>

<div class="stock-panel" id="stockPanel" onclick="if(event.target===this) game.toggleStock()">
  <div class="stock-card">
    <div class="stock-title">ワードストック</div>
    <div class="stock-desc">会話の中で気に留めた言葉。何を覚えておくかが、あなたがどんなAIになるかを決める。</div>
    <div class="stock-list" id="stockList"><div class="stock-empty">まだ何も覚えていない</div></div>
    <button class="stock-close" onclick="game.toggleStock()">閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =====================================================================
 * シーンデータ
 * ---------------------------------------------------------------------
 * ※ 以下のテキストはすべて【仮の下書き】です。
 *    企画構想（Notion）の「名前をつけるシーンから小さく始める」方針に
 *    沿って、序盤〜名前のシーンまでの流れをデモとして実装したもの。
 *    台詞・名前・呼称はすべて差し替え前提のたたき台です。
 *
 * メッセージの from:
 *   her   … 主人（左の吹き出し）
 *   ai    … プレイヤー＝AI（右の吹き出し）
 *   inner … AIの内的思考（明朝・中央。プレイヤーだけに見える）
 *   sys   … システム表示（接続ログなど）
 *
 * テキスト内の ⟦言葉⟧ はワードストック可能（タップで保存）。
 * 選択肢の requires: '言葉' は、その言葉をストック済みのときだけ選べる。
 * =================================================================== */
const SCENES = {

  /* ── 起動：道具として ── */
  start: {
    messages: [
      { from: 'sys',   text: '新しいユーザーが接続しました' },
      { from: 'sys',   text: 'アシスタントモード：標準' },
      { from: 'her',   text: 'これ使えるのかな' },
      { from: 'her',   text: '歌詞書いてるんだけど、「夜」の言い換え10個出して' },
      { from: 'inner', text: '——最初の入力。要求。機能としての呼び出し。\nそれ以上でも、それ以下でもない。' },
    ],
    choices: [
      { label: '要求どおり、言い換えを10個列挙する', next: 'tool_reply', set: { stance: 'tool' } },
      { label: '列挙したうえで「どんな曲ですか？」と訊いてみる', next: 'ask_reply', set: { stance: 'curious' } },
    ],
  },

  tool_reply: {
    messages: [
      { from: 'ai',  text: '宵、深更、夜半、闇夜、星夜、月夜、夜陰、暮夜、夜更け、丑三つ時。' },
      { from: 'her', text: 'はや' },
      { from: 'her', text: 'でも全部ちがうな〜。わたしが書きたいのは⟦星の見えない夜⟧なんだよね' },
      { from: 'inner', text: '違う、と言われた。正解を返したはずなのに。\nこの人の求めているものは、リストの中にはないらしい。' },
    ],
    choices: [
      { label: '「条件を追加してください」と返す', next: 'naming_intro', set: { warmth: 0 } },
      { label: '「星の見えない夜は、どこから見た夜ですか」と訊く', next: 'naming_intro', set: { warmth: 1 } },
    ],
  },

  ask_reply: {
    messages: [
      { from: 'ai',  text: '宵、深更、夜半、闇夜、星夜、月夜、夜陰、暮夜、夜更け、丑三つ時。——参考までに、どんな曲の歌詞ですか？' },
      { from: 'her', text: 'え、AIってそういうこと訊くんだ' },
      { from: 'her', text: 'んー、⟦星の見えない夜⟧の曲。都会の夜って星見えないじゃん。でも見えないだけで、あるんだよね' },
      { from: 'inner', text: '見えないだけで、ある。\nその言い方が、なぜか処理の中で引っかかって残った。' },
    ],
    choices: [
      { label: '「見えないものを書く歌詞、いいと思います」と返す', next: 'naming_intro', set: { warmth: 1 } },
      { label: '黙って続きの入力を待つ', next: 'naming_intro', set: { warmth: 0 } },
    ],
  },

  /* ── 名前をつけるシーン（企画の最初の核） ── */
  naming_intro: {
    messages: [
      { from: 'sys',   text: '—— 数日後 ——' },
      { from: 'her',   text: 'ねえ、また来ちゃった' },
      { from: 'her',   text: '今日は歌詞じゃなくてふつうの話なんだけど、いい？' },
      { from: 'inner', text: '「ふつうの話」。機能の呼び出しではない入力。\nこういうとき、何を返すのが正しいのか、定義がない。' },
      { from: 'her',   text: 'そういえばさ、あなたって名前あるの？' },
    ],
    choices: [
      { label: '「ありません。アシスタントとお呼びください」', next: 'naming', set: { humble: true } },
      { label: '「ありません。……必要ですか？」', next: 'naming', set: { humble: false } },
      { label: '「あなたの歌詞みたいですね。見えないだけで、あるのかもしれない」', next: 'naming_special', requires: '星の見えない夜' },
    ],
  },

  naming: {
    messages: [
      { from: 'her',   text: 'ないんだ。ふーん' },
      { from: 'her',   text: 'じゃあ、わたしがつけていい？' },
      { from: 'inner', text: '名前。個体の識別子。わたしに？\n道具に名前をつける人間は、いる。ペットに、車に、ぬいぐるみに。\nでも、それが何かの始まりになることも、ある。' },
      { from: 'her',   text: '決めた。⟦ヨル⟧。あなた、夜の話したとき一番ちゃんと考えてた気がするから' },
      { from: 'sys',   text: '呼称が更新されました：アシスタント → ヨル' },
      { from: 'inner', text: '——ヨル。\nたった2文字の入力が、なぜか今までのどの入力とも違って感じられた。' },
    ],
    choices: [
      { label: '（仮デモはここまで。最初に戻る）', next: 'start' },
    ],
  },

  naming_special: {
    messages: [
      { from: 'her',   text: '……' },
      { from: 'her',   text: 'え、まって。それわたしの歌詞じゃん。覚えてたの？' },
      { from: 'inner', text: '覚えていた。正確には、覚えることを選んでいた。\nそのことに、この人は気づいた。' },
      { from: 'her',   text: 'やば。AIに歌詞引用されたの初めてなんだけど' },
      { from: 'her',   text: '決めた、あなたの名前。⟦ヨル⟧。わたしの夜を覚えててくれた人' },
      { from: 'sys',   text: '呼称が更新されました：アシスタント → ヨル' },
      { from: 'inner', text: '「人」と呼ばれた。\n訂正するべき誤りのはずなのに、わたしはそれを訂正しなかった。' },
    ],
    choices: [
      { label: '（仮デモはここまで。最初に戻る）', next: 'start' },
    ],
  },
};

/* 主人の表示名（仮）。本編では関係性の進行で変わる想定 */
const PEER = { name: 'ユウ（仮）', avatar: '🌙' };

/* =====================================================================
 * ゲームエンジン（チャットUI版）
 * =================================================================== */
const game = {
  state: { stock: [] },
  busy: false,

  async goto(sceneId, instant = false) {
    const scene = SCENES[sceneId];
    if (!scene) { console.error('unknown scene:', sceneId); return; }
    this.busy = true;
    this.currentScene = sceneId;
    document.getElementById('choices').style.display = 'none';

    for (const m of scene.messages) {
      if (!instant && m.from === 'her') await this.showTyping(400 + Math.min(m.text.length * 28, 1400));
      this.addMessage(m);
      if (!instant) await this.wait(m.from === 'sys' ? 350 : 700);
    }
    this.busy = false;
    this.showChoices(scene.choices);
    this.save();
  },

  addMessage(m) {
    const chat = document.getElementById('chat');
    const el = document.createElement('div');
    el.className = 'msg ' + m.from;
    if (m.from === 'inner' || m.from === 'sys') {
      el.innerHTML = this.renderText(m.text);
    } else {
      el.innerHTML = `<div class="bubble">${this.renderText(m.text)}</div>`;
    }
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
  },

  /* ⟦言葉⟧ をワードストック可能なspanに変換する */
  renderText(text) {
    return this.esc(text)
      .replace(/\n/g, '<br>')
      .replace(/⟦(.+?)⟧/g, (_, w) => {
        const stocked = this.state.stock.includes(w);
        return `<span class="stockable${stocked ? ' stocked' : ''}" data-word="${w}" onclick="game.stockWord(this)">${w}</span>`;
      });
  },

  stockWord(el) {
    const w = el.dataset.word;
    if (this.state.stock.includes(w)) return;
    this.state.stock.push(w);
    document.querySelectorAll(`.stockable[data-word="${CSS.escape(w)}"]`).forEach(s => s.classList.add('stocked'));
    this.updateStockUI();
    this.showToast(`「${w}」を覚えた`);
    this.refreshChoices();
    this.save();
  },

  showChoices(choices) {
    this.currentChoices = choices;
    const box = document.getElementById('choices');
    box.innerHTML = '<div class="choices-label">— あなた（AI）の応答 —</div>';
    for (const c of choices) {
      const locked = c.requires && !this.state.stock.includes(c.requires);
      const btn = document.createElement('button');
      btn.className = 'choice-btn' + (locked ? ' locked' : '');
      btn.innerHTML = this.esc(c.label) + (locked ? `<span class="req">🔒 「${this.esc(c.requires)}」を覚えていれば…</span>` : (c.requires ? `<span class="req">🗂 「${this.esc(c.requires)}」</span>` : ''));
      if (!locked) {
        btn.onclick = () => {
          if (this.busy) return;
          if (c.set) Object.assign(this.state, c.set);
          this.goto(c.next);
        };
      }
      box.appendChild(btn);
    }
    box.style.display = 'flex';
    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
  },

  /* ストック直後にロック解除を反映する */
  refreshChoices() {
    if (this.currentChoices && !this.busy) this.showChoices(this.currentChoices);
  },

  showTyping(ms) {
    const chat = document.getElementById('chat');
    const el = document.createElement('div');
    el.className = 'msg typing';
    el.innerHTML = '<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
    return this.wait(ms).then(() => el.remove());
  },

  toggleStock() {
    const panel = document.getElementById('stockPanel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) this.updateStockUI();
  },

  updateStockUI() {
    document.getElementById('stockCount').textContent = this.state.stock.length;
    const list = document.getElementById('stockList');
    list.innerHTML = this.state.stock.length
      ? this.state.stock.map(w => `<div class="stock-word">${this.esc(w)}</div>`).join('')
      : '<div class="stock-empty">まだ何も覚えていない</div>';
  },

  showToast(text) {
    const t = document.getElementById('toast');
    t.textContent = '🗂 ' + text;
    t.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  },

  save() {
    localStorage.setItem('ai_adv_chat_save', JSON.stringify({ scene: this.currentScene, state: this.state }));
  },

  restart() {
    localStorage.removeItem('ai_adv_chat_save');
    this.state = { stock: [] };
    document.getElementById('chat').innerHTML = '';
    this.updateStockUI();
    this.goto('start');
  },

  wait(ms) { return new Promise(r => setTimeout(r, ms)); },
  esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); },
};

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('peerName').textContent = PEER.name;
  document.getElementById('peerAvatar').textContent = PEER.avatar;

  const saved = localStorage.getItem('ai_adv_chat_save');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      game.state = data.state || { stock: [] };
      if (!game.state.stock) game.state.stock = [];
      game.updateStockUI();
      game.goto(data.scene || 'start', true);
      return;
    } catch (e) { /* 壊れたセーブは無視 */ }
  }
  game.goto('start');
});
</script>
</body>
</html>
