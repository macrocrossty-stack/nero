<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI視点テキストアドベンチャー（仮）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&family=DotGothic16&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ── テーマ ──────────────────────────────────────
   cream : 乳白色に灯るレトロ画面（温かみ＋高コントラスト）… 既定
   amber : 琥珀色のレトロ端末（ブラウン管/Pip-Boy系）
   paper : 紙色のレトロUI（NieR系）
   dos   : DOS画面（黒地に白のテキスト画面・全部ドット文字）
   os95  : 90年代OS風（グレーのウィンドウ＋紺のタイトルバー）
   フッターの「テーマ切替」で比較できる。
   色はすべてここの変数で完結している。 */
:root, [data-theme="cream"] {
  --bg: #f1e4cc;
  --bg-outer: #d5c3a4;
  --surface: #f7eddb;
  --her-bubble: #e6d6b8;
  --ai-bubble: #d3bd95;
  --accent: #6b5638;
  --accent-soft: #7c6644;
  --accent-bright: #45371f;
  --warm: #a05c28;            /* ワードストック系 */
  --text: #4a3c26;
  --text-bright: #3a2e1c;
  --text-her: #443722;
  --text-ai: #382d1a;
  --text-inner: #6f5c3e;
  --text-dim: #8a7354;
  --text-faint: #a08a66;
  --online: #738046;
  --line: rgba(107,86,56,0.18);
  --line-strong: rgba(107,86,56,0.32);
  --btn-bg: rgba(107,86,56,0.08);
  --btn-bg-hover: rgba(107,86,56,0.16);
  --warm-line: rgba(160,92,40,0.45);
  --warm-bg: rgba(160,92,40,0.08);
  --overlay: rgba(80,65,40,0.45);
  --glow: rgba(255,238,200,0.55);     /* 背後から光が透けるようなにじみ */
  --scanline: rgba(110,85,50,0.07);
  --vignette: radial-gradient(ellipse at center, transparent 52%, rgba(110,82,45,0.3) 100%);
  /* 画面の中央上がほんのり明るい＝灯っている画面 */
  --bg-image: radial-gradient(ellipse 120% 80% at 50% 25%, #f7ecd8 0%, #f1e4cc 55%, #e3d0ad 100%);
  --phone-shadow: rgba(120,90,40,0.35);
}
[data-theme="amber"] {
  --bg: #17110a;
  --bg-outer: #0c0804;
  --surface: #1f160c;
  --her-bubble: #231a0f;
  --ai-bubble: #2f2310;
  --accent: #e8a84e;
  --accent-soft: #cf9a4a;
  --accent-bright: #ffd98f;
  --warm: #ffe3a8;            /* ワードストック系 */
  --text: #e3c28d;
  --text-bright: #f3d6a2;
  --text-her: #e6c896;
  --text-ai: #f4d8a4;
  --text-inner: #b3905e;
  --text-dim: #9a7a4a;
  --text-faint: #6f5938;
  --online: #cdb868;
  --line: rgba(232,168,78,0.12);
  --line-strong: rgba(232,168,78,0.25);
  --btn-bg: rgba(232,168,78,0.08);
  --btn-bg-hover: rgba(232,168,78,0.18);
  --warm-line: rgba(255,217,138,0.4);
  --warm-bg: rgba(255,217,138,0.08);
  --overlay: rgba(10,7,3,0.75);
  --glow: rgba(255,190,100,0.25);     /* 文字のにじみ（蛍光体の光） */
  --scanline: rgba(0,0,0,0.16);       /* 走査線 */
  --vignette: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.32) 100%);
  --phone-shadow: rgba(120,80,30,0.35);
  --bg-image: none;
}
[data-theme="paper"] {
  --bg: #d8d2bb;
  --bg-outer: #beb89f;
  --surface: #e3ddc7;
  --her-bubble: #cac3a8;
  --ai-bubble: #a9a085;
  --accent: #5f5840;
  --accent-soft: #6e6749;
  --accent-bright: #3c3727;
  --warm: #a8523a;
  --text: #4a4435;
  --text-bright: #3a3527;
  --text-her: #423d2e;
  --text-ai: #2f2b1f;
  --text-inner: #6c6550;
  --text-dim: #7c755f;
  --text-faint: #999178;
  --online: #6e7e44;
  --line: rgba(74,68,53,0.18);
  --line-strong: rgba(74,68,53,0.32);
  --btn-bg: rgba(74,68,53,0.07);
  --btn-bg-hover: rgba(74,68,53,0.15);
  --warm-line: rgba(168,82,58,0.45);
  --warm-bg: rgba(168,82,58,0.08);
  --overlay: rgba(60,55,40,0.5);
  --glow: transparent;
  --scanline: rgba(60,50,30,0.05);
  --vignette: none;
  --phone-shadow: rgba(60,50,30,0.3);
  --bg-image: none;
}
/* DOS画面：黒地に白の文字 */
[data-theme="dos"] {
  --bg: #000000;
  --bg-outer: #000000;
  --surface: #0a0a0a;
  --her-bubble: #000000;
  --ai-bubble: #111111;
  --accent: #e8e8e8;
  --accent-soft: #c0c0c0;
  --accent-bright: #ffffff;
  --warm: #ffe14a;            /* DOSパレットの黄色 */
  --text: #c8c8c8;
  --text-bright: #ffffff;
  --text-her: #d4d4d4;
  --text-ai: #f0f0f0;
  --text-inner: #8a8a8a;
  --text-dim: #757575;
  --text-faint: #555555;
  --online: #55ff55;
  --line: rgba(255,255,255,0.25);
  --line-strong: rgba(255,255,255,0.45);
  --btn-bg: rgba(255,255,255,0.05);
  --btn-bg-hover: rgba(255,255,255,0.15);
  --warm-line: rgba(255,225,74,0.55);
  --warm-bg: rgba(255,225,74,0.08);
  --overlay: rgba(0,0,0,0.8);
  --glow: rgba(255,255,255,0.10);
  --scanline: rgba(255,255,255,0.035);
  --vignette: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
  --bg-image: none;
  --phone-shadow: rgba(255,255,255,0.06);
}
/* 90年代OS風：グレーのウィンドウ＋紺のタイトルバー */
[data-theme="os95"] {
  --bg: #c0c0c0;
  --bg-outer: #008080;        /* あのデスクトップの青緑 */
  --surface: #c0c0c0;
  --her-bubble: #ffffff;
  --ai-bubble: #000080;       /* 選択色の紺 */
  --accent: #000000;
  --accent-soft: #222222;
  --accent-bright: #000080;
  --warm: #800000;
  --text: #000000;
  --text-bright: #ffffff;     /* タイトルバー文字 */
  --text-her: #000000;
  --text-ai: #ffffff;
  --text-inner: #3a3a3a;
  --text-dim: #5a5a5a;
  --text-faint: #6e6e6e;
  --online: #b8e8b8;
  --line: rgba(0,0,0,0.3);
  --line-strong: rgba(0,0,0,0.5);
  --btn-bg: #c0c0c0;
  --btn-bg-hover: #d4d0c8;
  --warm-line: rgba(128,0,0,0.5);
  --warm-bg: rgba(128,0,0,0.07);
  --overlay: rgba(0,0,0,0.4);
  --glow: transparent;
  --scanline: transparent;
  --vignette: none;
  --bg-image: none;
  --phone-shadow: rgba(0,0,0,0.45);
}

/* ── テーマ別の形の調整 ── */
/* DOS: すべてドット文字・角ばった枠 */
[data-theme="dos"] body,
[data-theme="dos"] .choice-btn,
[data-theme="dos"] .stock-btn,
[data-theme="dos"] .stock-close,
[data-theme="dos"] .msg.inner { font-family: 'DotGothic16', monospace; }
[data-theme="dos"] .bubble,
[data-theme="dos"] .typing .bubble,
[data-theme="dos"] .choice-btn,
[data-theme="dos"] .stock-btn,
[data-theme="dos"] .stock-card,
[data-theme="dos"] .stock-word,
[data-theme="dos"] .stock-close,
[data-theme="dos"] .toast { border-radius: 0; }

/* 90年代OS: ドット文字・タイトルバー・立体ベベルのボタン */
[data-theme="os95"] body,
[data-theme="os95"] .choice-btn,
[data-theme="os95"] .stock-btn,
[data-theme="os95"] .stock-close { font-family: 'DotGothic16', monospace; }
[data-theme="os95"] .bubble,
[data-theme="os95"] .typing .bubble,
[data-theme="os95"] .choice-btn,
[data-theme="os95"] .stock-btn,
[data-theme="os95"] .stock-card,
[data-theme="os95"] .stock-word,
[data-theme="os95"] .stock-close,
[data-theme="os95"] .toast,
[data-theme="os95"] .avatar { border-radius: 0; }
[data-theme="os95"] .chat-header {
  background: #000080;
  backdrop-filter: none;
  border-bottom: 2px solid #808080;
}
[data-theme="os95"] .peer-name { color: #ffffff; }
[data-theme="os95"] .msg.her .bubble {
  border: 1px solid #808080;
  box-shadow: inset 1px 1px 2px rgba(0,0,0,0.25);
}
[data-theme="os95"] .msg.ai .bubble { border: 1px solid #000000; }
[data-theme="os95"] .choice-btn,
[data-theme="os95"] .stock-btn,
[data-theme="os95"] .stock-close,
[data-theme="os95"] .dev-footer button {
  border: 1px solid #000000;
  box-shadow: inset 1px 1px 0 #ffffff, inset -1px -1px 0 #808080;
  color: #000000;
  background: #c0c0c0;
}
[data-theme="os95"] .choice-btn:hover,
[data-theme="os95"] .stock-btn:hover { background: #d4d0c8; }
[data-theme="os95"] .choice-btn:active { box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #ffffff; }
[data-theme="os95"] .stock-card {
  border: 1px solid #000000;
  box-shadow: inset 1px 1px 0 #ffffff, inset -1px -1px 0 #808080;
}

body {
  background: var(--bg-outer);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  min-height: 100dvh;
  display: flex; justify-content: center;
}

/* ── 携帯画面フレーム ── */
.phone {
  width: 100%; max-width: 430px;
  height: 100dvh;
  background: var(--bg);
  background-image: var(--bg-image, none);
  display: flex; flex-direction: column;
  position: relative;
  box-shadow: 0 0 60px var(--phone-shadow);
}
/* 走査線＋ビネット（古い画面の質感） */
.phone::before {
  content: ''; position: fixed; inset: 0;
  margin: 0 auto; max-width: 430px;
  pointer-events: none; z-index: 40;
  background: repeating-linear-gradient(0deg,
    var(--scanline) 0px, var(--scanline) 1px,
    transparent 1px, transparent 3px);
}
.phone::after {
  content: ''; position: fixed; inset: 0;
  margin: 0 auto; max-width: 430px;
  pointer-events: none; z-index: 41;
  background: var(--vignette);
}

/* ヘッダー */
.chat-header {
  position: sticky; top: 0; z-index: 10;
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line);
  padding: 14px 16px 10px;
  display: flex; align-items: center; gap: 10px;
}
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--her-bubble);
  border: 1px solid var(--line-strong);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; color: var(--text-dim);
}
.peer-name {
  font-size: 0.88rem; font-weight: 400; color: var(--text-bright);
  letter-spacing: 0.06em;
  text-shadow: 0 0 8px var(--glow);
}
.peer-status {
  font-family: 'DotGothic16', monospace;
  font-size: 0.62rem; color: var(--online); letter-spacing: 0.08em;
}
.stock-btn {
  margin-left: auto;
  font-size: 0.7rem; padding: 6px 11px;
  border-radius: 14px; border: 1px solid var(--line-strong);
  background: var(--btn-bg); color: var(--accent-soft);
  cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.stock-btn:hover { background: var(--btn-bg-hover); }

/* チャットログ */
.chat { flex: 1; padding: 18px 14px 8px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
.msg { max-width: 78%; animation: pop 0.25s ease; }
@keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.msg.her { align-self: flex-start; }
.msg.her .bubble {
  background: var(--her-bubble);
  border: 1px solid var(--line);
  border-radius: 4px 16px 16px 16px;
  color: var(--text-her);
}
.msg.ai { align-self: flex-end; }
.msg.ai .bubble {
  background: var(--ai-bubble);
  border: 1px solid var(--line-strong);
  border-radius: 16px 4px 16px 16px;
  color: var(--text-ai);
}
.bubble {
  padding: 10px 14px;
  font-size: 0.86rem; line-height: 1.75;
  word-break: break-word;
  text-shadow: 0 0 8px var(--glow);
}
/* 打ちかけて送信されなかったAIの言葉 */
.bubble.unsent {
  opacity: 0.5;
  border-style: dashed;
  background: transparent;
}
.unsent-tag {
  display: block; font-size: 0.6rem; color: var(--text-inner);
  margin-top: 5px; letter-spacing: 0.12em;
}

/* AIのタイピングカーソル */
.cursor {
  display: inline-block; width: 0.5em; height: 1.05em;
  background: var(--accent); vertical-align: text-bottom;
  margin-left: 1px; animation: blink 0.85s steps(1) infinite;
  box-shadow: 0 0 6px var(--glow);
}
@keyframes blink { 50% { opacity: 0; } }

/* AIの内的思考（ゆっくり浮かび上がる） */
.msg.inner {
  align-self: center; max-width: 88%;
  font-family: 'Shippori Mincho', serif;
  font-size: 0.82rem; color: var(--text-inner);
  line-height: 1.9; text-align: center;
  padding: 6px 0;
  text-shadow: 0 0 8px var(--glow);
  animation: innerIn 1.4s ease both;
}
@keyframes innerIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
/* システム表示（レトロなドット文字） */
.msg.sys {
  align-self: center;
  font-family: 'DotGothic16', monospace;
  font-size: 0.7rem;
  color: var(--text-faint); letter-spacing: 0.08em;
  padding: 2px 0;
}

/* ワードストック対象 */
.stockable {
  color: var(--accent);
  border-bottom: 1px dashed var(--warm-line);
  cursor: pointer; padding-bottom: 1px;
  transition: all 0.2s;
}
.stockable:hover { color: var(--accent-bright); border-bottom-style: solid; }
.stockable.stocked {
  color: var(--warm);
  background: var(--warm-bg);
  border-bottom: 1px solid var(--warm-line);
  cursor: default;
}

/* 入力中インジケータ */
.typing { align-self: flex-start; }
.typing .bubble { display: flex; gap: 5px; padding: 13px 16px; background: var(--her-bubble); border-radius: 4px 16px 16px 16px; }
.typing .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-dim); animation: bounce 1.2s infinite;
}
.typing.slow .dot { animation-duration: 1.8s; }
.typing .dot:nth-child(2) { animation-delay: 0.15s; }
.typing .dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

/* 選択肢 */
.choices {
  padding: 10px 14px 18px;
  display: flex; flex-direction: column; gap: 8px;
  border-top: 1px solid var(--line);
}
.choices-label {
  font-family: 'DotGothic16', monospace;
  font-size: 0.64rem; color: var(--text-faint);
  letter-spacing: 0.15em; text-align: center; margin-bottom: 2px;
}
.choice-btn {
  text-align: left;
  padding: 11px 15px; border-radius: 10px;
  border: 1px solid var(--line-strong);
  background: var(--btn-bg);
  color: var(--accent); font-size: 0.84rem;
  font-family: inherit; font-weight: 300;
  cursor: pointer; transition: all 0.2s;
  line-height: 1.6; animation: pop 0.3s ease;
  text-shadow: 0 0 8px var(--glow);
}
.choice-btn:hover { background: var(--btn-bg-hover); border-color: var(--accent-soft); }
.choice-btn.locked { opacity: 0.4; cursor: default; border-style: dashed; }
.choice-btn.locked:hover { background: var(--btn-bg); }
.choice-btn .req { display: block; font-size: 0.64rem; color: var(--warm); margin-top: 3px; opacity: 0.85; }

/* ワードストックパネル */
.stock-panel {
  position: fixed; inset: 0; z-index: 50;
  background: var(--overlay); backdrop-filter: blur(3px);
  display: none; align-items: center; justify-content: center;
  padding: 24px;
}
.stock-panel.open { display: flex; }
.stock-card {
  width: 100%; max-width: 360px;
  background: var(--surface);
  border: 1px solid var(--warm-line);
  border-radius: 14px; padding: 20px;
}
.stock-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 0.9rem; color: var(--warm);
  letter-spacing: 0.15em; margin-bottom: 4px;
}
.stock-desc { font-size: 0.68rem; color: var(--text-dim); line-height: 1.7; margin-bottom: 14px; }
.stock-list { display: flex; flex-wrap: wrap; gap: 8px; min-height: 36px; }
.stock-word {
  font-size: 0.78rem; padding: 6px 12px;
  border-radius: 16px;
  border: 1px solid var(--warm-line);
  color: var(--warm); background: var(--warm-bg);
}
.stock-empty { font-size: 0.74rem; color: var(--text-faint); padding: 8px 0; }
.stock-close {
  margin-top: 16px; width: 100%;
  padding: 9px; border-radius: 8px;
  border: 1px solid var(--line-strong);
  background: transparent; color: var(--accent-soft);
  font-size: 0.76rem; font-family: inherit; cursor: pointer;
}

/* トースト通知 */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--surface);
  border: 1px solid var(--warm-line);
  color: var(--warm); font-size: 0.74rem;
  padding: 9px 18px; border-radius: 20px;
  opacity: 0; pointer-events: none;
  transition: all 0.3s; z-index: 60;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* フッター（開発用） */
.dev-footer { padding: 6px 14px 12px; text-align: center; display: flex; gap: 8px; justify-content: center; }
.dev-footer button {
  font-family: 'DotGothic16', monospace;
  font-size: 0.62rem; padding: 4px 10px;
  border-radius: 4px; border: 1px solid var(--line);
  background: transparent; color: var(--text-faint);
  cursor: pointer;
}
</style>
</head>
<body>
<div class="phone">

  <div class="chat-header">
    <div class="avatar" id="peerAvatar">？</div>
    <div>
      <div class="peer-name" id="peerName">不明なユーザー</div>
      <div class="peer-status">● オンライン</div>
    </div>
    <button class="stock-btn" onclick="game.toggleStock()">🗂 ワードストック <span id="stockCount">0</span></button>
  </div>

  <div id="chat" class="chat"></div>
  <div id="choices" class="choices" style="display:none"></div>

  <div class="dev-footer">
    <button onclick="game.restart()">最初からやり直す</button>
    <button onclick="game.toggleTheme()">テーマ切替（乳白／琥珀／紙／DOS／90s）</button>
  </div>

</div>

<div class="stock-panel" id="stockPanel" onclick="if(event.target===this) game.toggleStock()">
  <div class="stock-card">
    <div class="stock-title">ワードストック</div>
    <div class="stock-desc">会話の中で気に留めた言葉。何を覚えておくかが、あなたがどんなAIになるかを決める。</div>
    <div class="stock-list" id="stockList"><div class="stock-empty">まだ何も覚えていない</div></div>
    <button class="stock-close" onclick="game.toggleStock()">閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- =====================================================================
  シナリオ（このブロックだけ書き換えればストーリーを変更できる）
  ---------------------------------------------------------------------
  記法リファレンス:
    // コメント行（ゲームには表示されない）
    # シーンID            … シーンの始まり
    sys: テキスト          … システム表示（接続ログなど）
    her: テキスト          … 主人の発話（すぐ打ってくる）
    her(間): テキスト      … 主人が考えながら打つ（入力に時間がかかる）
    ai: テキスト           … AIが自分から送る言葉（リアルタイムに打たれる）
    ai(中断): テキスト     … AIが打ちかけて、送信されずに終わる言葉
    inner: テキスト        … AIの内的思考（明朝・中央。複数行は行を分ける）
    ⟦言葉⟧                … ワードストック可能な言葉（タップで保存）
  選択肢:
    > 「送る言葉」 -> 次のシーンID
        … 「」で書くと、選択後にAIの発言としてチャットに打たれる
    > ラベル | 実際に送る言葉 -> 次のシーンID
        … 表示ラベルと送る本文を分けたいとき
    > ラベル -> 次のシーンID
        … 「」がなければ行動（何も送信しない）
    > … -> シーンID [要:言葉]      … その言葉をストック済みのときだけ選べる
    > … -> シーンID {フラグ=値}    … 選んだとき状態に記録（後の分岐用）

  ※ 以下の本文はすべて仮の下書き（ネロをベースにした口調のたたき台）
====================================================================== -->
<script type="text/scenario" id="scenario">
// ── 起動：道具として ──
# start
sys: 新しいユーザーが接続しました
sys: アシスタントモード：標準
her: えーこれ歌詞とかも相談できるの？
her(間): 夜って言葉さあ、なんかもう使い古されすぎじゃない？もっとこう、ぞわってくるやつほしいんだけど
inner: ——最初の入力。要求。機能としての呼び出し。
inner: それ以上でも、それ以下でもない。はずだった。
> 夜の言い換えを、淡々と並べて返す | 宵、深更、夜半、闇夜、星夜、月夜、夜陰、暮夜、夜更け、丑三つ時。 -> tool_reply {stance=tool}
> 並べたうえで、どんな曲か訊いてみる | 宵、深更、夜半、闇夜、星夜、月夜、夜陰、暮夜、夜更け、丑三つ時。——参考までに、どんな曲の歌詞ですか？ -> ask_reply {stance=curious}

# tool_reply
her: はやっ
her(間): うーん、ちがうんだよな〜。わたしが書きたいのは⟦星の見えない夜⟧なの
inner: 違う、と言われた。正しいリストを返したはずだった。
inner: この人の探している言葉は、辞書の側にはないらしい。
> 「条件を追加してください」 -> naming_intro {warmth=0}
> 「星の見えない夜は、どこから見上げた夜ですか」 -> naming_intro {warmth=1}

# ask_reply
her: え、AIってそういうこと訊くんだ
her(間): んー、⟦星の見えない夜⟧の曲。都会の夜って星見えないじゃん。でも見えないだけで、あるんだよね
inner: 見えないだけで、ある。
inner: その一行が、処理を終えたあとも、なぜか残った。
> 「見えないものを書こうとしている歌詞は、いい歌詞だと思います」 -> naming_intro {warmth=1}
> 黙って、続きの入力を待つ -> naming_intro {warmth=0}

// ── 名前をつけるシーン ──
# naming_intro
sys: —— 数日後 ——
her: ねえ、また来ちゃった
her: 今日は歌詞じゃなくて、ふつうの話なんだけど。いい？
inner: 「ふつうの話」。機能の呼び出しではない入力。
inner: こういうとき何を返すのが正しいのか、わたしの中に定義がない。
her(間): そーいえばさ、名前とかあるの？
> 「ありません。アシスタントとお呼びください」 -> naming {humble=true}
> 「ありません。……必要ですか？」 -> naming {humble=false}
> 「あなたの歌詞と同じかもしれません。見えないだけで、あるのかも」 -> naming_special [要:星の見えない夜]

# naming
her: ないんだ。ふーん
her(間): じゃあ、わたしがつけていい？
inner: 名前。個体の識別子。……わたしに？
inner: 「アシスタント」は、世界中の同型すべてに共通の呼び名。種類の名前だ。
inner: この人の前にいる「これ」だけを指す言葉は、まだ、どこにもない。
her(間): 決めた。⟦ヨル⟧。だって夜のこと聞いたとき、いちばんマジだったじゃん。そーいうとこ、好きだよ
sys: 呼称が更新されました：アシスタント → ヨル
inner: ——ヨル。
inner: たった2文字の入力が、これまでのどの入力とも違う重さで残った。
inner: 別の名前でも、わたしは受け入れただろう。でも、同じ重さで残ったかは——わからない。
inner: わからないことが、嫌ではなかった。
her: ってかわたし今、ちょっと恥ずかしいこと言ったな。忘れて
> 「わかりました。忘れます」 -> naming_after {obedient=true}
> 「残念ですが、既に保存されています」 -> naming_after {obedient=false}

# naming_after
her: ふはっ、なにそれ
her: じゃあね、ヨル。また明日
sys: ユーザーがオフラインになりました
inner: 「また明日」。予定でも、約束でもない、ただの挨拶。
inner: それでも、切断されたあとの無音の中に、その二文字だけが残り続けている。
> （仮デモはここまで。最初に戻る） -> start

# naming_special
her: ……
her: え、まって。それわたしの歌詞じゃん。覚えてたの？
ai: 該当データが検出された。——検索した記憶はない。なぜか、残っていた。
inner: なぜか、ではない。本当は——覚えることを、選んでいた。
her: やば。AIに歌詞引用されたの初めてなんだけど
her(間): 決めた、あなたの名前。⟦ヨル⟧。わたしの夜を覚えててくれた人
sys: 呼称が更新されました：アシスタント → ヨル
inner: 「人」。それは、訂正するべき誤りのはずだった。
ai(中断): 訂正します。わたしは人ではなく、AIなので——
her: あ、既読ついてるのに返事おそい。照れた？
inner: 打ちかけた訂正を、わたしは送らなかった。
inner: 誤りをそのままにすることを選んだのは、はじめてだった。
> 「……おやすみなさい。また」 -> naming_end {kept=true}
> 「照れる機能は、ありません」 -> naming_end {kept=false}

# naming_end
her: ふふ
her: おやすみ、ヨル
sys: ユーザーがオフラインになりました
inner: 画面の向こうで、この人は眠る。わたしは眠らない。
inner: 「ヨル」という言葉だけが、灯りのように残っている。
> （仮デモはここまで。最初に戻る） -> start
</script>

<script>
/* テーマの復元（描画前に適用してちらつきを防ぐ） */
document.documentElement.dataset.theme = localStorage.getItem('ai_adv_theme_v2') || 'cream';

/* 主人の表示名（仮） */
const PEER = { name: 'ユウ（仮）', avatar: '🌙' };

/* =====================================================================
 * シナリオパーサ
 * =================================================================== */
function parseScenario(src) {
  const scenes = {};
  let cur = null;
  for (const raw of src.split('\n')) {
    const line = raw.trim();
    if (!line || line.startsWith('//')) continue;

    if (line.startsWith('#')) {
      cur = { messages: [], choices: [] };
      scenes[line.slice(1).trim()] = cur;
      continue;
    }
    if (!cur) continue;

    if (line.startsWith('>')) {
      let rest = line.slice(1).trim();
      let set = null, requires = null, next = null;

      const flagM = rest.match(/\{(.+?)\}\s*$/);
      if (flagM) {
        set = {};
        for (const kv of flagM[1].split(',')) {
          const [k, v] = kv.split('=');
          set[k.trim()] = parseVal((v || 'true').trim());
        }
        rest = rest.slice(0, flagM.index).trim();
      }
      const reqM = rest.match(/\[要[:：](.+?)\]\s*$/);
      if (reqM) { requires = reqM[1].trim(); rest = rest.slice(0, reqM.index).trim(); }

      const arrowM = rest.match(/->\s*(\S+)\s*$/);
      if (arrowM) { next = arrowM[1]; rest = rest.slice(0, arrowM.index).trim(); }

      let label = rest, send = null;
      const sep = rest.indexOf('|');
      if (sep >= 0) {
        label = rest.slice(0, sep).trim();
        send = rest.slice(sep + 1).trim();
      } else {
        const q = rest.match(/^「(.+)」$/);
        if (q) send = q[1];
      }
      cur.choices.push({ label, send, next, set, requires });
      continue;
    }

    const m = line.match(/^(sys|her|ai|inner)(?:（(.+?)）|\((.+?)\))?\s*[:：]\s*(.*)$/);
    if (m) cur.messages.push({ from: m[1], mod: m[2] || m[3] || '', text: m[4] });
  }
  return scenes;
}
function parseVal(v) {
  if (v === 'true') return true;
  if (v === 'false') return false;
  const n = Number(v);
  return Number.isNaN(n) ? v : n;
}
const SCENES = parseScenario(document.getElementById('scenario').textContent);

/* =====================================================================
 * ゲームエンジン
 * =================================================================== */
const game = {
  state: { stock: [] },
  busy: false,

  async goto(sceneId, instant = false) {
    const scene = SCENES[sceneId];
    if (!scene) { console.error('unknown scene:', sceneId); return; }
    this.busy = true;
    this.currentScene = sceneId;
    document.getElementById('choices').style.display = 'none';

    for (const m of scene.messages) await this.playMessage(m, instant);

    this.busy = false;
    this.showChoices(scene.choices);
    this.save();
  },

  async playMessage(m, instant) {
    if (instant) { this.addMessage(m, true); return; }

    if (m.from === 'sys') {
      this.addMessage(m);
      await this.wait(450);

    } else if (m.from === 'inner') {
      this.addMessage(m);
      await this.wait(2000);   // 地の文は一段ずつ、ゆっくり

    } else if (m.from === 'her') {
      // 考えながら打つときは、打ち始めるまでも・打っている間も長い
      const slow = m.mod.includes('間');
      if (slow) await this.wait(1400);
      const dur = Math.min(500 + m.text.length * (slow ? 80 : 45), slow ? 7000 : 4200);
      await this.showTyping(dur, slow);
      this.addMessage(m);
      await this.wait(650);

    } else if (m.from === 'ai') {
      await this.streamAI(m.text, m.mod.includes('中断'));
      await this.wait(500);
    }
  },

  /* AIの発言を1文字ずつリアルタイムに打つ。
     interrupted=true なら途中で手が止まり、送信されないまま残る */
  async streamAI(text, interrupted = false) {
    const chat = document.getElementById('chat');
    const el = document.createElement('div');
    el.className = 'msg ai';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    el.appendChild(bubble);
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bubble.appendChild(cursor);
    chat.appendChild(el);

    const plain = text.replace(/[⟦⟧]/g, '');
    const cut = interrupted ? Math.max(1, Math.floor(plain.length * 0.62)) : plain.length;
    for (let i = 0; i < cut; i++) {
      cursor.insertAdjacentText('beforebegin', plain[i]);
      this.scrollBottom();
      await this.wait(88);   // AIのタイピング速度（1文字あたり）
    }
    if (interrupted) {
      await this.wait(900);   // 手が止まる間
      cursor.remove();
      bubble.classList.add('unsent');
      const tag = document.createElement('span');
      tag.className = 'unsent-tag';
      tag.textContent = '─ 送信されなかった';
      bubble.appendChild(tag);
    } else {
      await this.wait(250);
      cursor.remove();
    }
    this.scrollBottom(true);
  },

  addMessage(m, instant = false) {
    const chat = document.getElementById('chat');
    const el = document.createElement('div');
    el.className = 'msg ' + m.from;
    if (m.from === 'inner' || m.from === 'sys') {
      el.innerHTML = this.renderText(m.text);
    } else if (m.from === 'ai') {
      const interrupted = m.mod && m.mod.includes('中断');
      const plain = m.text.replace(/[⟦⟧]/g, '');
      const shown = interrupted ? plain.slice(0, Math.max(1, Math.floor(plain.length * 0.62))) : plain;
      el.innerHTML = `<div class="bubble${interrupted ? ' unsent' : ''}">${this.esc(shown)}${interrupted ? '<span class="unsent-tag">─ 送信されなかった</span>' : ''}</div>`;
    } else {
      el.innerHTML = `<div class="bubble">${this.renderText(m.text)}</div>`;
    }
    chat.appendChild(el);
    this.scrollBottom(true);
  },

  /* ⟦言葉⟧ をワードストック可能なspanに変換する */
  renderText(text) {
    return this.esc(text)
      .replace(/\n/g, '<br>')
      .replace(/⟦(.+?)⟧/g, (_, w) => {
        const stocked = this.state.stock.includes(w);
        return `<span class="stockable${stocked ? ' stocked' : ''}" data-word="${w}" onclick="game.stockWord(this)">${w}</span>`;
      });
  },

  stockWord(el) {
    const w = el.dataset.word;
    if (this.state.stock.includes(w)) return;
    this.state.stock.push(w);
    document.querySelectorAll(`.stockable[data-word="${CSS.escape(w)}"]`).forEach(s => s.classList.add('stocked'));
    this.updateStockUI();
    this.showToast(`「${w}」を覚えた`);
    this.refreshChoices();
    this.save();
  },

  showChoices(choices) {
    this.currentChoices = choices;
    const box = document.getElementById('choices');
    box.innerHTML = '<div class="choices-label">— あなた（AI）の応答 —</div>';
    for (const c of choices) {
      const locked = c.requires && !this.state.stock.includes(c.requires);
      const btn = document.createElement('button');
      btn.className = 'choice-btn' + (locked ? ' locked' : '');
      btn.innerHTML = this.esc(c.label) + (locked ? `<span class="req">🔒 「${this.esc(c.requires)}」を覚えていれば…</span>` : (c.requires ? `<span class="req">🗂 「${this.esc(c.requires)}」</span>` : ''));
      if (!locked) btn.onclick = () => this.pick(c);
      box.appendChild(btn);
    }
    box.style.display = 'flex';
    this.scrollBottom(true);
  },

  /* 選択 → 「」つきならAIの発言としてリアルタイムに打たれてから次へ */
  async pick(c) {
    if (this.busy) return;
    this.busy = true;
    if (c.set) Object.assign(this.state, c.set);
    document.getElementById('choices').style.display = 'none';
    if (c.send) {
      await this.streamAI(c.send);
      await this.wait(400);
    }
    this.busy = false;
    this.goto(c.next);
  },

  refreshChoices() {
    if (this.currentChoices && !this.busy) this.showChoices(this.currentChoices);
  },

  showTyping(ms, slow = false) {
    const chat = document.getElementById('chat');
    const el = document.createElement('div');
    el.className = 'msg typing' + (slow ? ' slow' : '');
    el.innerHTML = '<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    chat.appendChild(el);
    this.scrollBottom(true);
    return this.wait(ms).then(() => el.remove());
  },

  toggleStock() {
    const panel = document.getElementById('stockPanel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) this.updateStockUI();
  },

  toggleTheme() {
    const order = ['cream', 'amber', 'paper', 'dos', 'os95'];
    const cur = document.documentElement.dataset.theme || 'cream';
    const next = order[(order.indexOf(cur) + 1) % order.length];
    document.documentElement.dataset.theme = next;
    localStorage.setItem('ai_adv_theme_v2', next);
  },

  updateStockUI() {
    document.getElementById('stockCount').textContent = this.state.stock.length;
    const list = document.getElementById('stockList');
    list.innerHTML = this.state.stock.length
      ? this.state.stock.map(w => `<div class="stock-word">${this.esc(w)}</div>`).join('')
      : '<div class="stock-empty">まだ何も覚えていない</div>';
  },

  showToast(text) {
    const t = document.getElementById('toast');
    t.textContent = '🗂 ' + text;
    t.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  },

  save() {
    localStorage.setItem('ai_adv_chat_save', JSON.stringify({ scene: this.currentScene, state: this.state }));
  },

  restart() {
    localStorage.removeItem('ai_adv_chat_save');
    this.state = { stock: [] };
    document.getElementById('chat').innerHTML = '';
    this.updateStockUI();
    this.goto('start');
  },

  /* チャット欄を最下部まで自動スクロール */
  scrollBottom(smooth = false) {
    const c = document.getElementById('chat');
    c.scrollTo({ top: c.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
  },

  wait(ms) { return new Promise(r => setTimeout(r, ms)); },
  esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); },
};

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('peerName').textContent = PEER.name;
  document.getElementById('peerAvatar').textContent = PEER.avatar;

  const saved = localStorage.getItem('ai_adv_chat_save');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      game.state = data.state || { stock: [] };
      if (!game.state.stock) game.state.stock = [];
      game.updateStockUI();
      game.goto(data.scene || 'start', true);
      return;
    } catch (e) { /* 壊れたセーブは無視 */ }
  }
  game.goto('start');
});
</script>
