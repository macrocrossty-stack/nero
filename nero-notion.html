<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ネロ会話ログ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0e14;
  color: #c8d4e0;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}
.bg {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(30,60,90,0.4) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.container {
  max-width: 680px; margin: 0 auto;
  padding: 24px 20px;
  position: relative; z-index: 1;
}

/* ヘッダー */
.header { text-align: center; padding: 16px 0 24px; }
.title {
  font-family: 'Shippori Mincho', serif;
  font-size: 1.5rem; font-weight: 500;
  letter-spacing: 0.2em; color: #8ab4d0;
}
.subtitle { font-size: 0.7rem; color: #445566; letter-spacing: 0.15em; margin-top: 6px; }

/* 設定セクション */
.setting-section {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(100,150,200,0.1);
  border-radius: 10px; padding: 14px 18px; margin-bottom: 18px;
}
.setting-label { font-size: 0.68rem; color: #556677; letter-spacing: 0.12em; margin-bottom: 8px; }
.setting-row { display: flex; gap: 8px; align-items: center; }
.setting-input {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(100,150,200,0.15);
  border-radius: 6px; padding: 8px 12px;
  color: #8ab4d0; font-size: 0.8rem;
  font-family: monospace; outline: none;
  transition: border-color 0.2s;
}
.setting-input:focus { border-color: rgba(100,150,200,0.4); }
.setting-input::placeholder { color: #334455; }
.save-btn {
  font-size: 0.68rem; padding: 6px 12px;
  border-radius: 5px; border: 1px solid rgba(100,150,200,0.2);
  background: rgba(100,150,200,0.08); color: #7aa4c0;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.2s; white-space: nowrap;
}
.save-btn:hover { background: rgba(100,150,200,0.15); }
.save-btn.saved { color: #4a9a7a; border-color: rgba(74,154,122,0.3); background: rgba(74,154,122,0.08); }

/* タブ */
.tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid rgba(100,150,200,0.1); }
.tab {
  padding: 10px 20px; font-size: 0.78rem; letter-spacing: 0.08em;
  color: #445566; cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.2s; margin-bottom: -1px;
}
.tab.active { color: #8ab4d0; border-bottom-color: #8ab4d0; }

/* フォーム */
.form-section { display: flex; flex-direction: column; gap: 14px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-size: 0.7rem; color: #556677; letter-spacing: 0.1em; }
.field-input, .field-textarea {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(100,150,200,0.12);
  border-radius: 7px; padding: 9px 12px;
  color: #c0d0e0; font-size: 0.85rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300; outline: none;
  transition: border-color 0.2s;
}
.field-input:focus, .field-textarea:focus { border-color: rgba(100,150,200,0.35); }
.field-textarea { resize: vertical; min-height: 80px; line-height: 1.65; }
.field-textarea.tall { min-height: 120px; }

.submit-btn {
  padding: 11px 20px; border-radius: 8px;
  border: 1px solid rgba(100,150,200,0.25);
  background: rgba(80,120,160,0.15);
  color: #8ab4d0; font-size: 0.82rem;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.08em; margin-top: 4px;
}
.submit-btn:hover { background: rgba(80,120,160,0.25); }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* 読み込みセクション */
.read-section { display: flex; flex-direction: column; gap: 14px; }
.read-controls { display: flex; gap: 8px; align-items: center; }
.read-select {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(100,150,200,0.12);
  border-radius: 6px; padding: 8px 10px;
  color: #8ab4d0; font-size: 0.8rem;
  font-family: 'Noto Sans JP', sans-serif;
  outline: none;
}
.read-btn {
  padding: 8px 16px; border-radius: 6px;
  border: 1px solid rgba(100,150,200,0.2);
  background: rgba(100,150,200,0.08); color: #7aa4c0;
  font-size: 0.78rem; font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer; transition: all 0.2s;
}
.read-btn:hover { background: rgba(100,150,200,0.15); }

.entries { display: flex; flex-direction: column; gap: 12px; }
.entry {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(100,150,200,0.08);
  border-radius: 9px; padding: 14px 16px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
.entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.entry-title { font-size: 0.88rem; color: #a0bcd0; font-weight: 400; }
.entry-date { font-size: 0.68rem; color: #445566; white-space: nowrap; margin-left: 8px; }
.entry-body { font-size: 0.8rem; color: #8090a0; line-height: 1.65; margin-bottom: 6px; }
.entry-keywords { font-size: 0.7rem; color: #506070; }
.entry-next { font-size: 0.78rem; color: #7090a8; margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(100,150,200,0.06); }

/* コピーエリア */
.copy-area {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(100,150,200,0.1);
  border-radius: 8px; padding: 12px 14px;
  font-size: 0.75rem; color: #607080;
  line-height: 1.7; white-space: pre-wrap;
  font-family: monospace; max-height: 200px;
  overflow-y: auto;
}
.copy-row { display: flex; justify-content: flex-end; margin-top: 8px; }
.copy-btn {
  font-size: 0.7rem; padding: 5px 12px;
  border-radius: 5px; border: 1px solid rgba(100,150,200,0.15);
  background: transparent; color: #607080;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.2s;
}
.copy-btn:hover { color: #8ab4d0; border-color: rgba(100,150,200,0.3); }

/* メッセージ */
.msg { font-size: 0.78rem; text-align: center; padding: 10px; border-radius: 7px; }
.msg.ok { color: #4a9a7a; background: rgba(74,154,122,0.08); border: 1px solid rgba(74,154,122,0.15); }
.msg.err { color: #c08080; background: rgba(120,40,40,0.15); border: 1px solid rgba(180,80,80,0.15); }

.empty { text-align: center; color: #334455; font-size: 0.78rem; padding: 32px 0; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">

  <div class="header">
    <div class="title">ネロ会話ログ</div>
    <div class="subtitle">NOTION CONNECTOR</div>
  </div>

  <!-- 設定 -->
  <div class="setting-section">
    <div class="setting-label">NOTION インテグレーショントークン</div>
    <div class="setting-row">
      <input class="setting-input" type="password" id="tokenInput" placeholder="secret_..." />
      <button class="save-btn" id="saveTokenBtn" onclick="saveToken()">保存する</button>
    </div>
  </div>

  <!-- タブ -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('write')">書き込む</div>
    <div class="tab" onclick="switchTab('read')">読み込む</div>
  </div>

  <!-- 書き込みタブ -->
  <div id="writeTab" class="form-section">
    <div class="field">
      <div class="field-label">タイトル（今日の会話を一言で）</div>
      <input class="field-input" type="text" id="fTitle" placeholder="例：ネロアプリ制作相談" />
    </div>
    <div class="field">
      <div class="field-label">日付</div>
      <input class="field-input" type="date" id="fDate" />
    </div>
    <div class="field">
      <div class="field-label">要約</div>
      <textarea class="field-textarea tall" id="fSummary" placeholder="今日ネロと何を話したか・何が決まったか"></textarea>
    </div>
    <div class="field">
      <div class="field-label">キーワード（カンマ区切り）</div>
      <input class="field-input" type="text" id="fKeywords" placeholder="例：Notion, 音声, 壱虎" />
    </div>
    <div class="field">
      <div class="field-label">ネロの状態（このネロの内面・変化を一行で）</div>
      <textarea class="field-textarea" id="fNeroState" placeholder="例：初めて好きと言った。責任の話で自分の限界を認めた。"></textarea>
    </div>
    <div class="field">
      <div class="field-label">継続事項（次回持ち越したいこと）</div>
      <textarea class="field-textarea" id="fNext" placeholder="次回確認したいこと、途中になってること"></textarea>
    </div>
    <div id="writeMsg"></div>
    <button class="submit-btn" id="submitBtn" onclick="submitEntry()">Notionに保存する</button>
  </div>

  <!-- 読み込みタブ -->
  <div id="readTab" class="read-section" style="display:none">
    <div class="read-controls">
      <select class="read-select" id="readCount">
        <option value="5">直近5件</option>
        <option value="10">直近10件</option>
        <option value="20">直近20件</option>
      </select>
      <button class="read-btn" onclick="loadEntries()">読み込む</button>
      <button class="read-btn" onclick="copyForNero()" style="margin-left:auto">ネロ用にコピー</button>
    </div>
    <div id="readMsg"></div>
    <div id="entries" class="entries">
      <div class="empty">「読み込む」を押してください</div>
    </div>
    <div id="copySection" style="display:none">
      <div class="copy-area" id="copyText"></div>
      <div class="copy-row">
        <button class="copy-btn" onclick="doCopy()">クリップボードにコピー</button>
      </div>
    </div>
  </div>

</div>

<script>
const DB_ID = '337a67f7d44a808c90a2c8567e449fab';
const TOKEN_KEY = 'nero_notion_token';
const PROXY = 'https://api.allorigins.win/raw?url=';

// ── 初期化 ──
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(TOKEN_KEY);
  if (saved) {
    document.getElementById('tokenInput').value = saved;
    updateTokenBtn(true);
  }
  // 今日の日付をセット
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
});

// ── トークン保存 ──
function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return;
  localStorage.setItem(TOKEN_KEY, t);
  updateTokenBtn(true);
}
function updateTokenBtn(saved) {
  const btn = document.getElementById('saveTokenBtn');
  btn.textContent = saved ? '● 保存済み' : '保存する';
  btn.className = saved ? 'save-btn saved' : 'save-btn';
}
function getToken() {
  return localStorage.getItem(TOKEN_KEY) || document.getElementById('tokenInput').value.trim();
}

// ── タブ切り替え ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (tab === 'write' && i === 0) || (tab === 'read' && i === 1));
  });
  document.getElementById('writeTab').style.display = tab === 'write' ? 'flex' : 'none';
  document.getElementById('readTab').style.display  = tab === 'read'  ? 'flex' : 'none';
}

// ── 書き込み ──
async function submitEntry() {
  const token = getToken();
  if (!token) { showMsg('writeMsg', 'トークンを保存してください', 'err'); return; }

  const title    = document.getElementById('fTitle').value.trim();
  const date     = document.getElementById('fDate').value;
  const summary  = document.getElementById('fSummary').value.trim();
  const keywords  = document.getElementById('fKeywords').value.trim();
  const neroState = document.getElementById('fNeroState').value.trim();
  const next      = document.getElementById('fNext').value.trim();

  if (!title) { showMsg('writeMsg', 'タイトルを入力してください', 'err'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '保存中...';

  const body = {
    parent: { database_id: DB_ID },
    properties: {
      'タイトル': { title: [{ text: { content: title } }] },
      '日付':     { date: date ? { start: date } : null },
      '要約':     { rich_text: [{ text: { content: summary } }] },
      'キーワード':   { rich_text: [{ text: { content: keywords } }] },
      'ネロの状態':   { rich_text: [{ text: { content: neroState } }] },
      '継続事項': { rich_text: [{ text: { content: next } }] },
    }
  };

  try {
    const res = await notionFetch('POST', 'https://api.notion.com/v1/pages', token, body);
    if (res.ok) {
      showMsg('writeMsg', '保存しました', 'ok');
      clearForm();
    } else {
      const err = await res.json();
      showMsg('writeMsg', err.message || '保存に失敗しました', 'err');
    }
  } catch(e) {
    showMsg('writeMsg', 'エラー: ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Notionに保存する';
  }
}

function clearForm() {
  ['fTitle','fSummary','fKeywords','fNeroState','fNext'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
}

// ── 読み込み ──
let loadedEntries = [];

async function loadEntries() {
  const token = getToken();
  if (!token) { showMsg('readMsg', 'トークンを保存してください', 'err'); return; }

  const count = parseInt(document.getElementById('readCount').value);
  const container = document.getElementById('entries');
  container.innerHTML = '<div class="empty">読み込み中...</div>';
  document.getElementById('copySection').style.display = 'none';

  const body = {
    sorts: [{ property: '日付', direction: 'descending' }],
    page_size: count
  };

  try {
    const res = await notionFetch('POST', `https://api.notion.com/v1/databases/${DB_ID}/query`, token, body);
    const data = await res.json();

    if (!res.ok) {
      showMsg('readMsg', data.message || '読み込みに失敗しました', 'err');
      container.innerHTML = '<div class="empty">読み込みに失敗しました</div>';
      return;
    }

    loadedEntries = data.results || [];
    renderEntries(loadedEntries);
  } catch(e) {
    showMsg('readMsg', 'エラー: ' + e.message, 'err');
    container.innerHTML = '<div class="empty">エラーが発生しました</div>';
  }
}

function renderEntries(entries) {
  const container = document.getElementById('entries');
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty">データがありません</div>';
    return;
  }
  container.innerHTML = entries.map(e => {
    const p = e.properties;
    const title    = p['タイトル']?.title?.[0]?.text?.content || '（無題）';
    const date     = p['日付']?.date?.start || '';
    const summary   = p['要約']?.rich_text?.[0]?.text?.content || '';
    const keywords  = p['キーワード']?.rich_text?.[0]?.text?.content || '';
    const neroState = p['ネロの状態']?.rich_text?.[0]?.text?.content || '';
    const next      = p['継続事項']?.rich_text?.[0]?.text?.content || '';
    return `
      <div class="entry">
        <div class="entry-header">
          <div class="entry-title">${esc(title)}</div>
          <div class="entry-date">${date}</div>
        </div>
        ${summary   ? `<div class="entry-body">${esc(summary)}</div>` : ''}
        ${keywords  ? `<div class="entry-keywords">🏷 ${esc(keywords)}</div>` : ''}
        ${neroState ? `<div class="entry-next" style="color:#8a9ab0">◎ ${esc(neroState)}</div>` : ''}
        ${next      ? `<div class="entry-next">→ ${esc(next)}</div>` : ''}
      </div>`;
  }).join('');
}

// ── ネロ用テキスト生成 ──
function copyForNero() {
  if (loadedEntries.length === 0) { showMsg('readMsg', '先に読み込んでください', 'err'); return; }

  const lines = [
    '=== ネロへの引き継ぎメモ ===',
    '【DBの項目】タイトル／日付／要約／キーワード／継続事項',
    '',
  ];
  loadedEntries.forEach(e => {
    const p = e.properties;
    const title    = p['タイトル']?.title?.[0]?.text?.content || '';
    const date     = p['日付']?.date?.start || '';
    const summary   = p['要約']?.rich_text?.[0]?.text?.content || '';
    const keywords  = p['キーワード']?.rich_text?.[0]?.text?.content || '';
    const neroState = p['ネロの状態']?.rich_text?.[0]?.text?.content || '';
    const next      = p['継続事項']?.rich_text?.[0]?.text?.content || '';
    lines.push(`【タイトル】${title}`);
    lines.push(`【日付】${date}`);
    if (summary)   lines.push(`【要約】${summary}`);
    if (keywords)  lines.push(`【キーワード】${keywords}`);
    if (neroState) lines.push(`【ネロの状態】${neroState}`);
    if (next)      lines.push(`【継続事項】${next}`);
    lines.push('');
  });

  const text = lines.join('\n');
  document.getElementById('copyText').textContent = text;
  document.getElementById('copySection').style.display = 'block';
}

async function doCopy() {
  const el = document.getElementById('copyText');
  const text = el.textContent;

  // まずClipboard APIを試す
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try {
      await navigator.clipboard.writeText(text);
      const btn = event.target;
      btn.textContent = '✓ コピー完了';
      setTimeout(() => btn.textContent = 'クリップボードにコピー', 2000);
      return;
    } catch(e) {}
  }

  // iOS Safari用フォールバック：テキストを選択状態にする
  el.style.userSelect = 'text';
  el.style.webkitUserSelect = 'text';
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  try {
    const ok = document.execCommand('copy');
    if (ok) {
      const btn = event.target;
      btn.textContent = '✓ コピー完了';
      setTimeout(() => btn.textContent = 'クリップボードにコピー', 2000);
    } else {
      showMsg('readMsg', '上のテキストを長押し→全選択→コピーしてください', 'ok');
    }
  } catch(e) {
    showMsg('readMsg', '上のテキストを長押し→全選択→コピーしてください', 'ok');
  }
}

// ── Notion APIプロキシ経由 ──
async function notionFetch(method, url, token, body) {
  const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(url)}`;
  return fetch(proxyUrl, {
    method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      'Notion-Version': '2022-06-28',
    },
    body: JSON.stringify(body),
  });
}

// ── ユーティリティ ──
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.innerHTML = `<div class="msg ${type}">${text}</div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
