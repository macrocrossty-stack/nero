<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眠り姫と黒豹の物語 — シナリオプレビュー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #06080c; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center;
         font-family: "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", serif; }

  #stage { position: relative; aspect-ratio: 16 / 9; width: 100vw; max-width: calc(100vh * 16 / 9);
           max-height: 100vh; background: #000; overflow: hidden; cursor: pointer; user-select: none;
           container-type: size; }

  .bglayer { position: absolute; inset: 0; background-size: cover; background-position: center;
             transition: opacity 0.8s ease; }

  #chara { position: absolute; right: 5%; bottom: 0; height: 86%; z-index: 2;
           display: flex; align-items: flex-end; pointer-events: none; }
  #charaimg { height: 100%; opacity: 0; filter: drop-shadow(0 6px 24px rgba(0,0,0,0.55)); }

  #msgwin { position: absolute; left: 4%; right: 4%; bottom: 3%; height: 34%; z-index: 3;
            background: rgba(4, 6, 10, 0.74); border-top: 1px solid rgba(201,168,106,0.55);
            border-radius: 6px; padding: 2% 3% 1.4%; color: #e8e4da; }
  #namebox { position: absolute; top: -1.8em; left: 0.4em;
             font-size: clamp(11px, 1.9vmin, 17px); font-size: clamp(9px, 3cqh, 17px);
             color: #c9a86a; letter-spacing: 0.15em; text-shadow: 0 1px 4px #000; }
  #text { font-size: clamp(12px, 2.15vmin, 19px); font-size: clamp(10px, 3.4cqh, 19px);
          line-height: 1.8; letter-spacing: 0.05em;
          text-shadow: 0 1px 3px rgba(0,0,0,0.8); white-space: pre-wrap;
          height: 100%; overflow-y: auto; scrollbar-width: thin; }

  #marker { display: inline-block; margin-left: 0.4em; color: #c9a86a; animation: blink 1.1s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }
  @media (prefers-reduced-motion: reduce) { #marker { animation: none; } }

  #toolbar { position: absolute; top: 1.5%; right: 1.5%; display: flex; gap: 6px; z-index: 9;
             opacity: 0.25; transition: opacity 0.2s; }
  #toolbar:hover, #toolbar:focus-within { opacity: 1; }
  #toolbar button { font-size: 11px; padding: 4px 10px; background: rgba(0,0,0,0.55); color: #9ab;
                    border: 1px solid rgba(150,170,190,0.3); border-radius: 4px; cursor: pointer;
                    font-family: sans-serif; letter-spacing: 0.08em; }
  #toolbar button:hover, #toolbar button:focus-visible { color: #fff; border-color: rgba(201,168,106,0.7); outline: none; }

  #quickbar { position: absolute; bottom: 37.5%; right: 4%; z-index: 9;
              display: flex; gap: clamp(3px, 0.5cqw, 6px); opacity: 0.45; transition: opacity 0.2s; }
  #quickbar:hover, #quickbar:focus-within { opacity: 1; }
  .qbtn { font-size: clamp(8px, 2.2cqh, 11px);
          padding: clamp(2px, 0.6cqh, 4px) clamp(5px, 1.2cqw, 12px);
          background: rgba(0,0,0,0.45); color: #9ab;
          border: 1px solid rgba(150,170,190,0.25); border-radius: 4px; cursor: pointer;
          font-family: sans-serif; letter-spacing: 0.15em; }
  .qbtn:hover, .qbtn:focus-visible { color: #fff; border-color: rgba(201,168,106,0.7); outline: none; }
  .qbtn.active { color: #0a0e14; background: rgba(201,168,106,0.9); border-color: #c9a86a; }

  .choice-overlay { position: absolute; inset: 0; z-index: 8;
                    display: flex; flex-direction: column; align-items: center; justify-content: center;
                    gap: 2.2%; background: rgba(4, 6, 10, 0.35); cursor: default; }
  .choice-btn { min-width: 42%; padding: 1.2% 3%;
                background: rgba(4, 6, 10, 0.82); color: #e8e4da;
                border: 1px solid rgba(201,168,106,0.55); border-radius: 6px;
                font-family: inherit; font-size: clamp(13px, 2.3vmin, 20px); font-size: clamp(11px, 3.6cqh, 20px);
                letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; }
  .choice-btn:hover, .choice-btn:focus-visible { background: rgba(201,168,106,0.18);
                border-color: #c9a86a; outline: none; }

  /* 乗っ取り選択肢: 金ではなく、冷たい硝子の色 */
  .choice-overlay.hijack { cursor: not-allowed; }
  .choice-overlay.hijack .choice-btn { cursor: not-allowed; transition: all 0.5s; }
  .choice-overlay.hijack .choice-btn:hover { background: rgba(4, 6, 10, 0.82); border-color: rgba(201,168,106,0.55); }
  .choice-btn.refused { animation: refuse 0.18s 2; }
  @keyframes refuse { 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
  .choice-btn.hijack-focus { border-color: #7fd4d0; color: #cfeeea;
                background: rgba(90, 180, 175, 0.14); text-shadow: 0 0 12px rgba(127,212,208,0.5); }
  .choice-btn.hijack-dim { opacity: 0.25; }

  /* システム文体モード（調律機関の介入） */
  .sysmode { border-top-color: rgba(127, 212, 208, 0.6) !important; }
  .sysmode #text { font-family: ui-monospace, "Courier New", monospace;
                   color: #c8e6e2; letter-spacing: 0.14em; }
  .sysmode #namebox { font-family: ui-monospace, "Courier New", monospace;
                      color: #7fd4d0; letter-spacing: 0.2em; }
  .sysmode #marker { color: #7fd4d0; }

  .title-overlay { position: absolute; inset: 0; z-index: 10; cursor: default;
                   display: flex; align-items: center; justify-content: center;
                   background: radial-gradient(ellipse 90% 70% at 50% 30%, rgba(4,6,10,0.1) 0%, rgba(4,6,10,0.72) 100%); }
  .title-box { display: flex; flex-direction: column; align-items: center; gap: 2.4vmin; }
  .title-logo { font-size: clamp(24px, 6vmin, 58px); font-size: clamp(20px, 9.5cqh, 58px); color: #e8e4da; letter-spacing: 0.22em;
                text-shadow: 0 2px 18px rgba(0,0,0,0.9), 0 0 42px rgba(201,168,106,0.25); }
  .title-sub { font-size: clamp(10px, 1.7vmin, 15px); color: #8296aa; letter-spacing: 0.3em;
               margin-bottom: 3vmin; font-family: sans-serif; }
  .title-btn { min-width: 34cqw; padding: 1.8cqh 6cqw;
               background: rgba(4, 6, 10, 0.66); color: #e8e4da;
               border: 1px solid rgba(201,168,106,0.5); border-radius: 6px;
               font-family: inherit; font-size: clamp(13px, 2.4vmin, 21px); font-size: clamp(11px, 3.8cqh, 21px);
               letter-spacing: 0.3em; cursor: pointer; transition: all 0.15s; }
  .title-btn:hover, .title-btn:focus-visible { background: rgba(201,168,106,0.16);
               border-color: #c9a86a; outline: none; }

  .log-overlay { position: absolute; inset: 0; z-index: 11; background: rgba(4, 6, 10, 0.78);
                 display: flex; align-items: center; justify-content: center; cursor: default; }
  .log-panel { width: 76%; height: 84%; overflow-y: auto; padding: 3% 4%;
               background: rgba(10, 14, 20, 0.9); border: 1px solid rgba(201,168,106,0.35);
               border-radius: 8px; scrollbar-width: thin; }
  .log-entry { padding: 1.2% 0; border-bottom: 1px solid rgba(130,150,170,0.12);
               color: #cfd6dd; font-size: clamp(12px, 2vmin, 18px); font-size: clamp(10px, 3.2cqh, 18px); line-height: 1.8;
               white-space: pre-wrap; }
  .log-name { color: #c9a86a; font-size: 0.85em; letter-spacing: 0.12em; margin-bottom: 0.2em; }

  #hint { position: absolute; bottom: 1%; right: 1.5%; font-size: clamp(6px, 1.5cqh, 10px);
          color: rgba(255,255,255,0.35); max-width: 96%; text-align: right;
          font-family: sans-serif; letter-spacing: 0.05em; z-index: 5; }

  /* ヨルの手帳（章ロードマップ） */
  .journal-overlay { position: absolute; inset: 0; z-index: 12; background: rgba(4, 6, 10, 0.8);
                     display: flex; align-items: center; justify-content: center; cursor: default; }
  .journal-book { width: 72%; max-height: 88%; overflow-y: auto; scrollbar-width: thin;
                  background: linear-gradient(160deg, #efe6cf 0%, #e4d7ba 60%, #d9c9a6 100%);
                  border: 10px solid #2b2019; border-radius: 8px;
                  box-shadow: 0 10px 60px rgba(0,0,0,0.7), inset 0 0 40px rgba(120,95,60,0.25);
                  padding: 3.5cqh 4cqw; color: #3a3026; }
  .journal-head { text-align: center; font-size: clamp(13px, 3.6cqh, 22px); letter-spacing: 0.3em;
                  color: #4a3a28; margin-bottom: 0.4cqh; }
  .journal-lap { text-align: center; font-size: clamp(10px, 2.4cqh, 15px); letter-spacing: 0.25em;
                 color: #8a7658; margin-bottom: 2.4cqh; }
  .journal-entry { display: block; width: 100%; text-align: left; cursor: pointer;
                   background: transparent; border: none; border-bottom: 1px solid rgba(90,70,45,0.3);
                   padding: 1.6cqh 1cqw; font-family: inherit; transition: background 0.15s; }
  .journal-entry:hover:not(.locked), .journal-entry:focus-visible:not(.locked) {
                   background: rgba(120, 95, 60, 0.14); outline: none; }
  .journal-entry.locked { cursor: default; opacity: 0.45; }
  .journal-title { font-size: clamp(13px, 3.2cqh, 20px); color: #3a3026; letter-spacing: 0.12em; }
  .journal-note { font-size: clamp(10px, 2.4cqh, 15px); color: #7a6850; margin-top: 0.4cqh;
                  letter-spacing: 0.06em; }
</style>
</head>
<body>
<div id="stage">
  <div class="bglayer" id="bgA" style="opacity:1"></div>
  <div class="bglayer" id="bgB" style="opacity:0"></div>
  <div id="chara"><img id="charaimg" alt=""></div>
  <div id="quickbar">
    <button id="autobtn" class="qbtn">AUTO</button>
    <button id="skipbtn" class="qbtn">SKIP</button>
    <button id="logbtn" class="qbtn">LOG</button>
    <button id="bookbtn" class="qbtn">手帳</button>
  </div>
  <div id="msgwin">
    <div id="namebox"></div>
    <div id="text"></div>
  </div>
  <div id="hint">クリック / Enter で進む　A: オート　S: スキップ(既読のみ)　L: ログ　M: 手帳　※素材はすべて仮</div>
</div>

<script src="scenario_data.js"></script>
<script>
window.BG_RESOLVE = s => "../game/data/bgimage/" + s;
window.CHARA_RESOLVE = s => "../game/data/fgimage/" + s;
window.DEBUG_UNLOCK = true; // 開発用: 手帳の全章を解放（公開ビルドでは false）
</script>
<script src="player.js"></script>
</body>
</html>
