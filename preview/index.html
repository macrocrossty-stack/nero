<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眠り姫と黒豹の物語 — シナリオプレビュー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #06080c; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center;
         font-family: "Yu Mincho", "Hiragino Mincho ProN", "Noto Serif JP", serif; }

  #stage { position: relative; aspect-ratio: 16 / 9; width: 100vw; max-width: calc(100vh * 16 / 9);
           max-height: 100vh; background: #000; overflow: hidden; cursor: pointer; user-select: none; }

  .bglayer { position: absolute; inset: 0; background-size: cover; background-position: center;
             transition: opacity 0.8s ease; }

  #msgwin { position: absolute; left: 4%; right: 4%; bottom: 3%; height: 30%;
            background: rgba(4, 6, 10, 0.72); border-top: 1px solid rgba(201,168,106,0.55);
            border-radius: 6px; padding: 2.2% 3% 1.5%; color: #e8e4da; }
  #namebox { position: absolute; top: -1.7em; left: 0.4em; font-size: clamp(11px, 1.9vmin, 18px);
             color: #c9a86a; letter-spacing: 0.15em; text-shadow: 0 1px 4px #000; }
  #text { font-size: clamp(13px, 2.5vmin, 24px); line-height: 1.9; letter-spacing: 0.06em;
          text-shadow: 0 1px 3px rgba(0,0,0,0.8); white-space: pre-wrap;
          height: 100%; overflow: hidden; }

  #marker { display: inline-block; margin-left: 0.4em; color: #c9a86a; animation: blink 1.1s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.15; } }
  @media (prefers-reduced-motion: reduce) { #marker { animation: none; } }

  #toolbar { position: absolute; top: 1.5%; right: 1.5%; display: flex; gap: 6px; z-index: 5;
             opacity: 0.25; transition: opacity 0.2s; }
  #toolbar:hover, #toolbar:focus-within { opacity: 1; }
  #toolbar button { font-size: 11px; padding: 4px 10px; background: rgba(0,0,0,0.55); color: #9ab;
                    border: 1px solid rgba(150,170,190,0.3); border-radius: 4px; cursor: pointer;
                    font-family: sans-serif; letter-spacing: 0.08em; }
  #toolbar button:hover, #toolbar button:focus-visible { color: #fff; border-color: rgba(201,168,106,0.7); outline: none; }

  .choice-overlay { position: absolute; inset: 0; z-index: 8;
                    display: flex; flex-direction: column; align-items: center; justify-content: center;
                    gap: 2.2%; background: rgba(4, 6, 10, 0.35); cursor: default; }
  .choice-btn { min-width: 42%; padding: 1.2% 3%;
                background: rgba(4, 6, 10, 0.82); color: #e8e4da;
                border: 1px solid rgba(201,168,106,0.55); border-radius: 6px;
                font-family: inherit; font-size: clamp(13px, 2.3vmin, 22px);
                letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; }
  .choice-btn:hover, .choice-btn:focus-visible { background: rgba(201,168,106,0.18);
                border-color: #c9a86a; outline: none; }

  #hint { position: absolute; bottom: 1%; right: 1.5%; font-size: 10px; color: rgba(255,255,255,0.35);
          font-family: sans-serif; letter-spacing: 0.05em; z-index: 5; }
</style>
</head>
<body>
<div id="stage">
  <div class="bglayer" id="bgA" style="opacity:1"></div>
  <div class="bglayer" id="bgB" style="opacity:0"></div>
  <div id="toolbar">
    <button data-jump="first.ks">タイトル</button>
    <button data-jump="prologue.ks">プロローグ</button>
    <button data-jump="chapter1.ks">第1章</button>
    <button data-jump="chapter2.ks">第2章</button>
    <button data-jump="chapter3.ks">第3章</button>
  </div>
  <div id="msgwin">
    <div id="namebox"></div>
    <div id="text"></div>
  </div>
  <div id="hint">クリック / Enter で進む　※開発用プレビュー（背景はすべて仮素材）</div>
</div>

<script src="scenario_data.js"></script>
<script>window.BG_RESOLVE = s => "../game/data/bgimage/" + s;</script>
<script src="player.js"></script>
</body>
</html>
