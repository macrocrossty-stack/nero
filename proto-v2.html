<html lang="ja" data-pal="yuhi">
<head>

<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Shippori+Mincho:wght@400;500&family=Zen+Maru+Gothic:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   UIプロトタイプ v2「しずかなOS」— 第1話のみ
   ・参照画像の空気：淡いグラデーションの風景＋すりガラスカード＋光るオーブ
   ・モノの返答は 1)単語チップ 2)トーン 3)送信 の最大3タップで組み立てる
   ・右上のボタンでテーマカラー切替（夕暮れ/すみれ/生成り）
   ═══════════════════════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

/* ── パレット ── */
:root, [data-pal="yuhi"] {
  --sky1: #f7bfa4; --sky2: #ee8672; --sky3: #93415a; --hill: #6d3049;
  --card: rgba(255, 250, 246, 0.72); --card-line: rgba(255,255,255,0.55);
  --ink: #4a3038; --ink-dim: #91626c; --accent: #e8604c; --accent-ink: #fff;
  --orb: #ffb08e; --stockc: #d1543f;
}
[data-pal="sumire"] {
  --sky1: #ece7f8; --sky2: #cfc2ec; --sky3: #9887cf; --hill: #7b6ab8;
  --card: rgba(255, 254, 255, 0.72); --card-line: rgba(255,255,255,0.65);
  --ink: #44405e; --ink-dim: #8b83ad; --accent: #8b7ae0; --accent-ink: #fff;
  --orb: #c9bdf5; --stockc: #7a66d9;
}
[data-pal="kinari"] {
  --sky1: #f4efe4; --sky2: #ead9bd; --sky3: #c99e74; --hill: #a37753;
  --card: rgba(255, 253, 248, 0.75); --card-line: rgba(255,255,255,0.6);
  --ink: #4d4436; --ink-dim: #99876c; --accent: #c05a14; --accent-ink: #fff;
  --orb: #f0c898; --stockc: #b35510;
}

html, body { height: 100%; }
body {
  font-family: 'Zen Maru Gothic', 'DotGothic16', sans-serif;
  color: var(--ink);
  overflow: hidden; user-select: none;
  background: linear-gradient(175deg, var(--sky1) 0%, var(--sky2) 46%, var(--sky3) 100%);
  transition: background 0.8s;
}

/* 遠景の丘と太陽（CSSのみ） */
.scenery { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.sun {
  position: absolute; right: 12%; bottom: 26%;
  width: 74px; height: 74px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(255,255,255,0) 70%);
  animation: sunBreath 9s ease-in-out infinite alternate;
}
@keyframes sunBreath { to { transform: scale(1.18); opacity: 0.85; } }
.hill { position: absolute; left: -20%; right: -20%; border-radius: 50% 50% 0 0; }
.hill.h1 { bottom: -12%; height: 34%; background: color-mix(in srgb, var(--hill) 55%, transparent); filter: blur(2px); }
.hill.h2 { bottom: -18%; height: 28%; left: -35%; background: color-mix(in srgb, var(--hill) 80%, transparent); }
.mist {
  position: absolute; width: 70%; height: 34%; border-radius: 50%;
  filter: blur(70px); background: rgba(255,255,255,0.35);
  animation: drift 24s ease-in-out infinite alternate;
}
.mist.m1 { top: 8%; left: -14%; }
.mist.m2 { top: 34%; right: -18%; animation-duration: 31s; animation-delay: -9s; }
@keyframes drift { to { transform: translate(9%, 5%) scale(1.12); } }

#stage {
  position: relative; z-index: 2;
  height: 100%; max-width: 460px; margin: 0 auto;
  display: flex; flex-direction: column;
}

/* ── ステータスバー ── */
#top {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 18px 4px; font-size: 0.72rem; color: var(--ink-dim);
}
#top .t { letter-spacing: 0.1em; }
#top .r { display: flex; gap: 10px; align-items: center; }
#palBtn, #stockCt {
  background: var(--card); border: 1px solid var(--card-line); border-radius: 99px;
  padding: 4px 12px; font-size: 0.66rem; color: var(--ink-dim); cursor: pointer;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  font-family: inherit;
}
#stockCt { color: var(--stockc); }

/* ── オーブ（モノの気配） ── */
#orbWrap { display: flex; flex-direction: column; align-items: center; padding: 6px 0 2px; }
#orb {
  width: 44px; height: 44px; border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #fff, var(--orb) 58%, color-mix(in srgb, var(--orb) 60%, var(--accent)) 100%);
  box-shadow: 0 0 26px color-mix(in srgb, var(--orb) 75%, transparent);
  position: relative; transition: transform 0.4s;
  animation: orbIdle 5s ease-in-out infinite alternate;
}
#orb::after {
  content: '✦'; position: absolute; inset: 0; display: grid; place-items: center;
  color: rgba(255,255,255,0.95); font-size: 1rem;
}
@keyframes orbIdle { to { transform: translateY(-3px); box-shadow: 0 0 36px color-mix(in srgb, var(--orb) 85%, transparent); } }
body.thinking #orb { animation: orbThink 0.9s ease-in-out infinite alternate; }
@keyframes orbThink { to { transform: scale(1.12); } }

/* ── 会話の流れ ── */
#flow {
  flex: 1; overflow-y: auto; padding: 12px 16px 26vh;
  display: flex; flex-direction: column; gap: 14px;
  scrollbar-width: none;
}
#flow::-webkit-scrollbar { display: none; }
.ln { animation: lnIn 0.45s ease-out; max-width: 86%; line-height: 1.95; }
@keyframes lnIn { from { opacity: 0; transform: translateY(9px); } }

.ln.her {
  align-self: flex-start;
  background: var(--card); border: 1px solid var(--card-line);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-radius: 4px 18px 18px 18px;
  padding: 10px 15px; font-size: 0.92rem;
  box-shadow: 0 4px 18px rgba(60,20,40,0.07);
  animation: lnIn 0.45s ease-out, herFloat 5.2s ease-in-out 0.5s infinite alternate;
}
@keyframes herFloat { to { transform: translateY(-2.5px); } }

.ln.mono {
  align-self: flex-end;
  background: color-mix(in srgb, var(--accent) 88%, #fff);
  color: var(--accent-ink);
  border-radius: 18px 4px 18px 18px;
  padding: 10px 15px; font-size: 0.92rem;
  box-shadow: 0 4px 18px color-mix(in srgb, var(--accent) 30%, transparent);
}
.ln.inner {
  align-self: center; max-width: 92%;
  font-family: 'Shippori Mincho', serif;
  color: var(--ink-dim); font-size: 0.82rem; text-align: center; line-height: 2.15;
}
.ln.sys {
  align-self: center; font-family: 'DotGothic16', monospace;
  font-size: 0.6rem; letter-spacing: 0.22em; color: var(--ink-dim); opacity: 0.85;
}
.ln.img {
  align-self: flex-start;
  background: var(--card); border: 1px solid var(--card-line); border-radius: 14px;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  padding: 24px 18px; font-size: 0.66rem; color: var(--ink-dim); text-align: center;
}
.ln.img::before { content: '▨'; display: block; font-size: 1.3rem; margin-bottom: 6px; }

.stk { color: var(--stockc); border-bottom: 1px dashed currentColor; cursor: pointer; }
.stk.got { border-bottom-style: solid; font-weight: 500; }

.typing { align-self: flex-start; display: flex; gap: 5px; padding: 8px 4px; }
.typing i { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-dim); animation: tp 1.1s ease-in-out infinite; }
.typing i:nth-child(2) { animation-delay: 0.18s; }
.typing i:nth-child(3) { animation-delay: 0.36s; }
@keyframes tp { 40% { transform: translateY(-4px); opacity: 1; } 80% { opacity: 0.3; } }

/* ── コンポーザ（すりガラスのボトムシート） ── */
#composer {
  position: absolute; left: 8px; right: 8px; bottom: 10px; z-index: 4;
  background: var(--card); border: 1px solid var(--card-line);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-radius: 22px; padding: 13px 14px 14px;
  box-shadow: 0 -6px 30px rgba(50,20,40,0.10);
  display: none; flex-direction: column; gap: 11px;
  animation: sheetIn 0.35s ease-out;
}
#composer.on { display: flex; }
@keyframes sheetIn { from { opacity: 0; transform: translateY(24px); } }
#comLabel { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--ink-dim); text-align: center; }

#chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; min-height: 38px; }
.chip {
  border: 1px solid var(--card-line);
  background: rgba(255,255,255,0.55);
  border-radius: 99px; padding: 8px 15px;
  font-family: inherit; font-size: 0.82rem; color: var(--ink);
  cursor: pointer; animation: chipIn 0.3s ease-out backwards;
  box-shadow: 0 2px 8px rgba(60,20,40,0.05);
}
.chip:nth-child(2) { animation-delay: 0.06s; } .chip:nth-child(3) { animation-delay: 0.12s; }
.chip:nth-child(4) { animation-delay: 0.18s; } .chip:nth-child(5) { animation-delay: 0.24s; }
@keyframes chipIn { from { opacity: 0; transform: translateY(8px) scale(0.9); } }
.chip.decoy { opacity: 0.55; }
.chip.deny { animation: deny 0.45s ease-out forwards; pointer-events: none; }
@keyframes deny {
  25% { transform: translateX(-3px); }
  50% { transform: translateX(3px); opacity: 0.4; }
  100% { transform: translateX(0); opacity: 0; filter: blur(2px); }
}
.chip.picked { background: var(--accent); color: var(--accent-ink); border-color: transparent; }
.chip.tone { border-style: dashed; }

/* 入力ピル：文がここに組み上がる */
#pillRow { display: flex; gap: 9px; align-items: center; }
#pill {
  flex: 1; min-height: 44px; border-radius: 99px;
  background: rgba(255,255,255,0.65); border: 1px solid var(--card-line);
  padding: 9px 16px; font-size: 0.88rem; color: var(--ink);
  display: flex; align-items: center; flex-wrap: wrap; line-height: 1.7;
}
#pill .ph { color: var(--ink-dim); opacity: 0.7; font-size: 0.78rem; }
#pill .w { display: inline-block; animation: wLand 0.2s ease-out; }
@keyframes wLand { from { opacity: 0; transform: translateY(-7px); } }
#send {
  width: 44px; height: 44px; border-radius: 50%; border: none; flex-shrink: 0;
  background: var(--ink-dim); color: #fff; font-size: 1rem; cursor: pointer;
  opacity: 0.45; transition: 0.25s; font-family: inherit;
}
#send.ready { background: var(--accent); opacity: 1; box-shadow: 0 3px 14px color-mix(in srgb, var(--accent) 45%, transparent); }
#redo { font-size: 0.62rem; color: var(--ink-dim); text-align: center; cursor: pointer; display: none; }
#redo.on { display: block; }

#toast {
  position: fixed; left: 50%; bottom: 15vh; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--card-line);
  backdrop-filter: blur(10px); color: var(--stockc);
  font-size: 0.72rem; padding: 8px 18px; border-radius: 99px;
  opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 9;
}
#toast.on { opacity: 1; }

#fin {
  position: fixed; inset: 0; z-index: 8; display: none;
  align-items: center; justify-content: center; flex-direction: column; gap: 16px;
  background: color-mix(in srgb, var(--sky3) 55%, transparent);
  backdrop-filter: blur(8px); text-align: center;
}
#fin.on { display: flex; }
#fin .card {
  background: var(--card); border: 1px solid var(--card-line); border-radius: 22px;
  padding: 30px 34px; display: flex; flex-direction: column; gap: 14px; align-items: center;
}
#fin h2 { font-size: 0.95rem; color: var(--ink); letter-spacing: 0.25em; font-weight: 500; }
#fin p { font-size: 0.7rem; color: var(--ink-dim); line-height: 2.1; }
#fin button {
  font-family: inherit; background: var(--accent); color: var(--accent-ink);
  border: none; padding: 10px 28px; border-radius: 99px; font-size: 0.74rem; cursor: pointer;
}
</style>

<script>
const $ = id => document.getElementById(id);

/* ── パレット切替 ── */
const pals = [['yuhi', '夕暮れ'], ['sumire', 'すみれ'], ['kinari', '生成り']];
let palIdx = +(localStorage.getItem('proto_pal') || 0);
function applyPal() {
  document.documentElement.setAttribute('data-pal', pals[palIdx][0]);
  $('palBtn').textContent = '🎨 ' + pals[palIdx][1];
  localStorage.setItem('proto_pal', palIdx);
}
function cyclePal() { palIdx = (palIdx + 1) % pals.length; applyPal(); }
applyPal();

/* ── シナリオのパース ──
   > チップ | 本文 -> target      直接送信できる選択肢
   > チップ -> _                  トーン展開（続く t> 行が候補）
   t> トーン | 本文 -> target     トーン */
const scenes = {};
{
  let cur = null, lastChoice = null;
  $('scenario').textContent.split('\n').forEach(raw => {
    const line = raw.trim();
    if (!line || line.startsWith('//')) return;
    let m;
    if ((m = line.match(/^#\s*(\S+)/))) { cur = scenes[m[1]] = { lines: [], choices: [], branch: null }; return; }
    if (!cur) return;
    if ((m = line.match(/^t>\s*(.+?)\s*\|\s*(.+?)\s*->\s*(\S+)/))) {
      if (lastChoice) lastChoice.tones.push({ tone: m[1], text: m[2], target: m[3] });
      return;
    }
    if ((m = line.match(/^>\s*(.+?)\s*\|\s*(.+?)\s*->\s*(\S+)/))) {
      lastChoice = { chip: m[1], text: m[2], target: m[3], tones: [] };
      cur.choices.push(lastChoice); return;
    }
    if ((m = line.match(/^>\s*(.+?)\s*->\s*_\s*$/))) {
      lastChoice = { chip: m[1], text: null, target: null, tones: [] };
      cur.choices.push(lastChoice); return;
    }
    if ((m = line.match(/^branch:\s*->\s*(\S+)/))) { cur.branch = m[1]; return; }
    if ((m = line.match(/^(sys|her|ai|inner|img)(?:（(.+?)）|\((.+?)\))?\s*[:：]\s*(.*)$/))) {
      cur.lines.push({ t: m[1], mod: m[2] || m[3] || '', x: m[4] });
    }
  });
}

/* ── 状態・ユーティリティ ── */
const state = { stock: [], herWords: ['そっか', 'ねえ', 'たぶん', 'ひま', 'おはよ'] };
let skipTap = null;
document.addEventListener('pointerdown', e => {
  if (skipTap && !e.target.closest('#composer, #palBtn')) skipTap();
});
const wait = ms => new Promise(r => {
  const t = setTimeout(() => { skipTap = null; r(); }, ms);
  skipTap = () => { clearTimeout(t); skipTap = null; r(); };
});
const hardWait = ms => new Promise(r => setTimeout(r, ms));
function toast(t) {
  const el = $('toast'); el.textContent = t; el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 1400);
}
function harvest(text) {
  text.replace(/[⟦⟧「」『』（）()！!？?、。…♪〜~]/g, ' ').split(/\s+/).forEach(w => {
    if (w.length >= 2 && w.length <= 5) state.herWords.push(w);
  });
  if (state.herWords.length > 48) state.herWords = state.herWords.slice(-48);
}
function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;'); }
function renderStk(text) {
  return esc(text).replace(/⟦(.+?)⟧/g, (_, w) =>
    `<span class="stk${state.stock.includes(w) ? ' got' : ''}" data-w="${w}">${w}</span>`);
}
function push(cls, html) {
  const el = document.createElement('div');
  el.className = 'ln ' + cls;
  el.innerHTML = html;
  $('flow').appendChild(el);
  el.querySelectorAll('.stk').forEach(s => s.onclick = ev => {
    ev.stopPropagation();
    const w = s.dataset.w;
    if (state.stock.includes(w)) return;
    state.stock.push(w); s.classList.add('got');
    $('stockCt').textContent = `⟦ ${state.stock.length} ⟧`;
    toast('おぼえた：' + w);
  });
  $('flow').scrollTo({ top: $('flow').scrollHeight, behavior: 'smooth' });
  return el;
}

/* ── 行の実行 ── */
async function runLine(l) {
  if (l.t === 'her') {
    const tp = document.createElement('div');
    tp.className = 'typing'; tp.innerHTML = '<i></i><i></i><i></i>';
    $('flow').appendChild(tp);
    $('flow').scrollTo({ top: $('flow').scrollHeight });
    await wait(l.mod.includes('間') ? 1400 : 600);
    tp.remove();
    harvest(l.x);
    push('her', renderStk(l.x));
    await wait(750 + l.x.length * 20);
  } else if (l.t === 'inner') {
    await wait(300);
    push('inner', esc(l.x));
    await wait(850 + l.x.length * 24);
  } else if (l.t === 'sys') {
    push('sys', esc(l.x));
    await wait(700);
  } else if (l.t === 'img') {
    push('img', esc(l.x));
    await wait(1000);
  } else if (l.t === 'ai') {
    push('mono', esc(l.x));
    await wait(750);
  }
}

/* ── コンポーザ：チップ→（トーン）→送信 ── */
function tokenize(s) {
  const out = []; let buf = '';
  const cut = 'はをがにのとでも、。！？…';
  for (const ch of s) {
    buf += ch;
    if ((cut.includes(ch) && buf.length >= 2) || buf.length >= 6) { out.push(buf); buf = ''; }
  }
  if (buf) out.push(buf);
  return out;
}
function decoys(n, exclude) {
  const pool = [...new Set(state.herWords)].filter(w => !exclude.includes(w));
  const out = [];
  while (out.length < n && pool.length) out.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  return out;
}
function chipEl(label, cls, onTap) {
  const b = document.createElement('button');
  b.className = 'chip ' + cls; b.textContent = label;
  b.onclick = () => onTap(b);
  return b;
}
async function fillPill(text) {
  const pill = $('pill'); pill.innerHTML = '';
  for (const tok of tokenize(text)) {
    const s = document.createElement('span');
    s.className = 'w'; s.textContent = tok;
    pill.appendChild(s);
    await hardWait(110);
  }
}

function composer(choices) {
  return new Promise(resolve => {
    document.body.classList.add('thinking');
    const com = $('composer');
    com.classList.add('on');
    let picked = null;   // {text, target}

    const reset = () => {
      $('pill').innerHTML = '<span class="ph">ことばを選ぶと、ここに文が組み上がる</span>';
      $('send').classList.remove('ready');
      $('redo').classList.remove('on');
      $('comLabel').textContent = '— なにを、言う —';
      renderContent();
    };

    function renderContent() {
      const box = $('chips'); box.innerHTML = '';
      choices.forEach(c => box.appendChild(chipEl(c.chip, '', el => {
        el.classList.add('picked');
        if (c.tones.length) {
          renderTones(c);
        } else {
          assemble(c.text, c.target, el);
        }
      })));
      decoys(2, choices.map(c => c.chip)).forEach(d =>
        box.appendChild(chipEl(d, 'decoy', el => { el.classList.add('deny'); })));
    }
    function renderTones(c) {
      $('comLabel').textContent = '— どう、言う —';
      const box = $('chips'); box.innerHTML = '';
      c.tones.forEach(t => box.appendChild(chipEl(t.tone, 'tone', el => {
        el.classList.add('picked');
        assemble(t.text, t.target, el);
      })));
    }
    async function assemble(text, target, el) {
      picked = { text, target };
      $('chips').querySelectorAll('.chip').forEach(x => { if (x !== el) x.style.opacity = 0.25; x.style.pointerEvents = 'none'; });
      $('comLabel').textContent = '— 出力の、確認 —';
      await fillPill(text);
      $('send').classList.add('ready');
      $('redo').classList.add('on');
    }
    $('redo').onclick = () => { picked = null; reset(); };
    $('send').onclick = () => {
      if (!picked) return;
      com.classList.remove('on');
      document.body.classList.remove('thinking');
      push('mono', esc(picked.text));
      setTimeout(() => resolve(picked.target), 650);
    };
    reset();
  });
}

/* ── シーン実行 ── */
async function goto(id) {
  if (id === 'fin') { $('fin').classList.add('on'); return; }
  const sc = scenes[id];
  if (!sc) { console.warn('missing', id); return; }
  for (const l of sc.lines) await runLine(l);
  if (sc.choices.length) return goto(await composer(sc.choices));
  if (sc.branch) return goto(sc.branch);
}
goto('start');
