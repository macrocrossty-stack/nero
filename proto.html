<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>MONO — proto v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Shippori+Mincho:wght@400;500&family=Zen+Maru+Gothic:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   UIプロトタイプ v3「水面とすりガラス」— 第1話のみ
   ・ガラスの下に色の層（canvas）。陽菜の入力＝波紋と温度
   ・UI全体の色味はモノの感情と連動（オーブをタップで気分プレビュー）
   ・単語選択はv1の浮遊感 × 3タップ完結（単語→トーン→送信）
   ═══════════════════════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  /* JSがモノの感情に応じて毎フレーム更新する */
  --ink: #4b4e5a;
  --ink-dim: #8a8d9c;
  --glass: rgba(255,255,255,0.34);
  --glass-line: rgba(255,255,255,0.5);
  --accent: #e08a5e;
  --stockc: #c96b3a;
}

html, body { height: 100%; }
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  color: var(--ink);
  overflow: hidden; user-select: none;
  background: #babcc4;
}

/* 1層目：色の層（水面）。ここに温度・波紋・感情が描かれる */
#deep { position: fixed; inset: 0; z-index: 0; }

/* 2層目：すりガラス。下の色がぼけて透ける */
#glass {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  backdrop-filter: blur(26px) saturate(1.15);
  -webkit-backdrop-filter: blur(26px) saturate(1.15);
  background: var(--glass);
  transition: background 1.2s;
}

/* 3層目：文字とUI */
#stage {
  position: relative; z-index: 2;
  height: 100%; max-width: 460px; margin: 0 auto;
  display: flex; flex-direction: column;
}

#top {
  display: flex; justify-content: space-between; align-items: center;
  padding: 13px 18px 4px;
  font-family: 'DotGothic16', monospace;
  font-size: 0.66rem; letter-spacing: 0.14em; color: var(--ink-dim);
}
#stockCt { cursor: pointer; color: var(--stockc); }

/* オーブ：モノの気配。タップで感情プレビュー切替（デモ用） */
#orbWrap { display: flex; justify-content: center; padding: 4px 0 0; }
#orb {
  width: 48px; height: 48px; cursor: pointer;
  animation: orbIdle 5.5s ease-in-out infinite alternate;
}
@keyframes orbIdle { to { transform: translateY(-3px); } }
body.thinking #orb { animation: orbThink 1s ease-in-out infinite alternate; }
@keyframes orbThink { to { transform: scale(1.14); } }

/* ── 会話の流れ ── */
#flow {
  flex: 1; overflow-y: auto; padding: 14px 16px 30vh;
  display: flex; flex-direction: column; gap: 15px;
  scrollbar-width: none;
}
#flow::-webkit-scrollbar { display: none; }
.ln { animation: lnIn 0.5s ease-out; max-width: 86%; line-height: 2.0; }
@keyframes lnIn { from { opacity: 0; transform: translateY(10px); } }

.ln.her {
  align-self: flex-start;
  background: var(--glass); border: 1px solid var(--glass-line);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-radius: 6px 20px 20px 20px;
  padding: 11px 16px; font-size: 0.92rem;
  animation: lnIn 0.5s ease-out, herFloat 5.4s ease-in-out 0.5s infinite alternate;
}
@keyframes herFloat { to { transform: translateY(-2.5px); } }

.ln.mono {
  align-self: flex-end;
  background: color-mix(in srgb, var(--accent) 26%, var(--glass));
  border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--glass-line));
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-radius: 20px 6px 20px 20px;
  padding: 11px 16px; font-size: 0.92rem;
}
.ln.inner {
  align-self: center; max-width: 92%;
  font-family: 'Shippori Mincho', serif;
  color: var(--ink-dim); font-size: 0.83rem; text-align: center; line-height: 2.2;
}
.ln.sys {
  align-self: center; font-family: 'DotGothic16', monospace;
  font-size: 0.6rem; letter-spacing: 0.22em; color: var(--ink-dim); opacity: 0.8;
}
.ln.img {
  align-self: flex-start;
  background: var(--glass); border: 1px solid var(--glass-line); border-radius: 16px;
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  padding: 24px 18px; font-size: 0.66rem; color: var(--ink-dim); text-align: center;
}
.ln.img::before { content: '▨'; display: block; font-size: 1.3rem; margin-bottom: 6px; }

/* ストック可能な言葉：文字の背に、あたたかい光が呼吸している */
.stk { position: relative; z-index: 0; color: var(--stockc); cursor: pointer; }
.stk::before {
  content: ''; position: absolute; inset: -0.3em -0.5em; z-index: -1; border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,178,118,0.4), rgba(255,178,118,0.12) 58%, transparent 76%);
  filter: blur(2px);
  animation: stkBreath 2.6s ease-in-out infinite alternate;
}
@keyframes stkBreath { from { opacity: 0.5; transform: scale(0.9); } to { opacity: 1; transform: scale(1.12); } }
.stk.got { font-weight: 500; }
.stk.got::before { animation: none; opacity: 0.22; }   /* おぼえた言葉は、静かに灯りつづける */

/* ワードストックのチュートリアル（最初のひかる言葉にだけ出る） */
.ln.tut {
  align-self: center; text-align: center;
  font-family: 'DotGothic16', monospace; font-size: 0.62rem;
  letter-spacing: 0.2em; color: var(--stockc); opacity: 0.85;
  transition: opacity 0.6s;
}
.ln.tut.off { opacity: 0; }

.typing { align-self: flex-start; display: flex; gap: 5px; padding: 8px 4px; }
.typing i { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-dim); animation: tp 1.1s ease-in-out infinite; }
.typing i:nth-child(2) { animation-delay: 0.18s; }
.typing i:nth-child(3) { animation-delay: 0.36s; }
@keyframes tp { 40% { transform: translateY(-4px); opacity: 1; } 80% { opacity: 0.3; } }

/* ── コンポーザ：ガラスのシート＋浮遊する言葉 ── */
#composer {
  position: absolute; left: 8px; right: 8px; bottom: 10px; z-index: 4;
  background: var(--glass); border: 1px solid var(--glass-line);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 24px; padding: 12px 14px 14px;
  display: none; flex-direction: column; gap: 8px;
  animation: sheetIn 0.35s ease-out;
}
#composer.on { display: flex; }
@keyframes sheetIn { from { opacity: 0; transform: translateY(24px); } }
#comLabel {
  font-family: 'DotGothic16', monospace;
  font-size: 0.58rem; letter-spacing: 0.24em; color: var(--ink-dim); text-align: center;
}

/* 浮遊する候補：大きさ＝重み。ゆらゆら漂う（v1の空間配置） */
#cands { position: relative; height: 132px; }
.cand {
  position: absolute; transform: translate(-50%, -50%);
  color: var(--ink); cursor: pointer; white-space: nowrap;
  padding: 9px 12px;
  animation: cIn 0.35s ease-out backwards, bob 3.8s ease-in-out infinite alternate;
  text-shadow: 0 1px 6px rgba(255,255,255,0.4);
}
.cand.hot { font-weight: 500; }
.cand.decoy { color: var(--ink-dim); opacity: 0.6; }
@keyframes cIn { from { opacity: 0; transform: translate(-50%, -34%) scale(0.8); } }
@keyframes bob { from { margin-top: 0; } to { margin-top: -8px; } }
.cand.deny { animation: deny 0.45s ease-out forwards; pointer-events: none; }
@keyframes deny {
  30% { transform: translate(-53%, -50%); opacity: 0.4; }
  60% { transform: translate(-47%, -50%); }
  100% { transform: translate(-50%, -44%); opacity: 0; filter: blur(3px); }
}
.cand.pick { animation: pick 0.3s ease-in forwards; pointer-events: none; }
@keyframes pick { to { transform: translate(-50%, 60%) scale(0.7); opacity: 0; } }

/* 入力ピル（ガラス）＋送信 */
#pillRow { display: flex; gap: 9px; align-items: center; }
#pill {
  flex: 1; min-height: 44px; border-radius: 99px;
  background: rgba(255,255,255,0.28); border: 1px solid var(--glass-line);
  padding: 9px 16px; font-size: 0.88rem; color: var(--ink);
  display: flex; align-items: center; flex-wrap: wrap; line-height: 1.7;
}
#pill .ph { color: var(--ink-dim); opacity: 0.75; font-size: 0.76rem; }
#pill .w { display: inline-block; animation: wLand 0.2s ease-out; }
@keyframes wLand { from { opacity: 0; transform: translateY(-7px); } }
#send {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  border: 1px solid var(--glass-line);
  background: rgba(255,255,255,0.25); color: var(--ink-dim);
  font-size: 1rem; cursor: pointer; opacity: 0.5; transition: 0.3s;
  font-family: inherit;
}
#send.ready {
  background: color-mix(in srgb, var(--accent) 75%, #fff); color: #fff;
  opacity: 1; box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 55%, transparent);
}
#redo { font-size: 0.6rem; color: var(--ink-dim); text-align: center; cursor: pointer; display: none; }
#redo.on { display: block; }

/* ── OS風起動画面：bootログ → 鏡写しのサインイン → 夜明け → Hello ── */
#boot {
  position: fixed; inset: 0; z-index: 20; background: #0b0d15;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 28px;
  transition: transform 0.65s cubic-bezier(0.2, 0.7, 0.2, 1), opacity 0.65s, background-color 2s;
}
#boot.lit { background: #ced1d9; }   /* チャット画面の基調（しずか）と同じ温度 */
#boot.away { transform: translateY(-100%); opacity: 0.3; pointer-events: none; }

/* 深海の水流と、変形しつづける幾何学。1枚のcanvasでクロスフェード */
#bootGeo {
  position: absolute; inset: 0; pointer-events: none;
  filter: blur(22px); transition: filter 2.4s;
}
#boot.lit #bootGeo { filter: blur(1.5px); }   /* 深度はcanvas側で点ごとに描き分ける */

/* bootログ：暗い画面のあいだ、文字にはずっと色収差がかかっている */
#bootTerm {
  position: absolute; top: 11%; left: 9%; right: 5%;
  font-family: 'DotGothic16', monospace; font-size: 0.7rem; line-height: 2.2;
  letter-spacing: 0.1em; color: #96abae; text-align: left;
  white-space: pre-wrap;
  text-shadow: 1.4px 0 rgba(255, 90, 140, 0.5), -1.4px 0 rgba(90, 220, 255, 0.45);
  opacity: 0; transition: opacity 0.9s;
}
#bootTerm.on { opacity: 1; }
#bootTerm.dim { opacity: 0.22; }
#bootTerm .tl { display: block; min-height: 1em; }

/* 鏡写しのサインイン：ガラスの向こうから誰かが打っている */
#mirror {
  position: absolute; left: 50%; top: 47%;
  transform: translate(-50%, -50%) scaleX(-1);
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  opacity: 0; transition: opacity 0.9s; pointer-events: none;
}
#mirror.on { opacity: 1; }
#mirror .cap {
  font-family: 'DotGothic16', monospace; font-size: 0.62rem;
  letter-spacing: 0.32em; color: #98a6b4; filter: blur(0.4px);
  margin-bottom: 2px;
}
#mirror .mrow { display: flex; flex-direction: column; gap: 5px; align-items: flex-start; }
#mirror .mlab {
  font-family: 'DotGothic16', monospace; font-size: 0.56rem;
  letter-spacing: 0.26em; color: #7e8b98; filter: blur(0.4px);
  padding-left: 4px;
}
#mirror .mfld {
  width: 216px; min-height: 2.35em; padding: 10px 18px; border-radius: 13px;
  border: 1px solid rgba(200, 215, 225, 0.45); background: rgba(170, 190, 205, 0.13);
  box-shadow: 0 0 28px rgba(180, 200, 220, 0.13), inset 0 0 18px rgba(180, 200, 220, 0.07);
  font-family: 'DotGothic16', monospace; font-size: 1.08rem;
  letter-spacing: 0.22em; color: #e2ecf5; text-align: left;
  filter: blur(1.4px);          /* にじみは残しつつ、鏡文字だと気づける程度に */
}

/* 指先の熱：不定形のにじみ。1/fゆらぎで一打ごとに形・強さ・大きさ・尺が変わる */
.touchGlow {
  position: absolute; pointer-events: none;
  border-radius: var(--br1, 50%);
  filter: blur(3px);
  transform: translate(-50%, -50%) rotate(var(--rot, 0deg)) scale(0.4);
  opacity: 0;
  animation: tGlow var(--d, 1.4s) ease-out forwards;
}
@keyframes tGlow {
  12% { opacity: var(--pk, 1); }
  55% { border-radius: var(--br2, 50%); }
  100% {
    transform: translate(-50%, -50%) rotate(var(--rot, 0deg)) scale(var(--sc, 1.6));
    border-radius: var(--br1, 50%); opacity: 0;
  }
}

#hello {
  min-height: 2.6rem; font-size: 1.9rem; color: #4a4e59;
  letter-spacing: 0.06em; opacity: 0;
}
#boot.lit #swipeHint { color: #8b8e97; }
#hello.show { animation: helloIn 1s ease-out forwards; }
@keyframes helloIn { from { opacity: 0; transform: translateY(9px); filter: blur(7px); } to { opacity: 1; } }
#swipeHint {
  position: absolute; bottom: 52px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  font-family: 'DotGothic16', monospace;
  color: #767d92; font-size: 0.62rem; letter-spacing: 0.3em;
  opacity: 0; transition: opacity 0.6s;
}
#swipeHint.show { opacity: 1; animation: hintFloat 1.9s ease-in-out infinite alternate; }
@keyframes hintFloat { to { transform: translateY(-7px); } }
#swipeHint::before { content: '︿'; font-size: 1.05rem; letter-spacing: 0; }

/* 復元／リセット確認：本編の幕間カード（#fin）と同じテイスト */
.bootCard {
  position: absolute; left: 22px; right: 22px; top: 50%; transform: translateY(-50%);
  background: rgba(255, 255, 255, 0.42); border: 1px solid rgba(255, 255, 255, 0.55);
  border-radius: 26px; backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  padding: 36px 26px; display: none; flex-direction: column; gap: 15px; align-items: center;
}
.bootCard.show { display: flex; animation: helloIn 0.7s ease-out; }
.bootCard h3 { font-size: 0.92rem; color: #4a4e59; letter-spacing: 0.3em; font-weight: 500; }
.bootCard p { font-size: 0.7rem; color: #8b8e97; line-height: 2.1; text-align: center; letter-spacing: 0.1em; }
.bootCard button {
  font-family: inherit; cursor: pointer;
  border: 1px solid rgba(90, 96, 110, 0.25); background: rgba(255, 255, 255, 0.4);
  color: #4a4e59; padding: 11px 0; width: 190px; border-radius: 99px;
  font-size: 0.78rem; letter-spacing: 0.22em;
}
.bootCard button.sub {
  background: transparent; border-color: rgba(90, 96, 110, 0.15);
  color: #8b8e97; font-size: 0.7rem; width: 170px; padding: 9px 0;
}

/* ── 実験C：時刻の光（太陽⇄月） ── */
#dayline { display: flex; align-items: center; gap: 6px; }
#dayline i { font-style: normal; font-size: 0.72rem; opacity: 0.5; }
#dayline em { font-style: normal; margin-left: 5px; }
#dayline .track { position: relative; width: 54px; height: 2px; border-radius: 2px; background: rgba(255,255,255,0.3); }
#dayDot {
  position: absolute; left: 86%; top: 50%; transform: translate(-50%, -50%);
  width: 8px; height: 8px; border-radius: 50%; background: #fff;
  box-shadow: 0 0 10px rgba(255,238,200,0.9);
  transition: left 2s;
}

/* ── 実験A：innerに計測（HUD）の質感。寒色時ほど浮き出る ── */
.ln.inner { position: relative; padding-top: 10px; }
.ln.inner::before {
  content: ''; position: absolute; top: 0; left: 14%; right: 14%; height: 5px;
  border-top: 1px solid currentColor;
  background:
    linear-gradient(currentColor, currentColor) left top / 1px 5px no-repeat,
    linear-gradient(currentColor, currentColor) right top / 1px 5px no-repeat;
  opacity: var(--hud-a, 0); transition: opacity 0.8s;
}

#toast {
  position: fixed; left: 50%; bottom: 15vh; transform: translateX(-50%);
  background: var(--glass); border: 1px solid var(--glass-line);
  backdrop-filter: blur(12px); color: var(--stockc);
  font-size: 0.72rem; padding: 8px 18px; border-radius: 99px;
  opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 9;
}
#toast.on { opacity: 1; }

#fin {
  position: fixed; inset: 0; z-index: 8; display: none;
  align-items: center; justify-content: center;
  backdrop-filter: blur(10px); background: rgba(120,120,130,0.25);
}
#fin.on { display: flex; }
#fin .card {
  background: var(--glass); border: 1px solid var(--glass-line); border-radius: 24px;
  backdrop-filter: blur(20px);
  padding: 30px 34px; text-align: center; display: flex; flex-direction: column; gap: 14px; align-items: center;
}
#fin h2 { font-size: 0.92rem; color: var(--ink); letter-spacing: 0.25em; font-weight: 500; }
#fin p { font-size: 0.7rem; color: var(--ink-dim); line-height: 2.1; }
#fin button {
  font-family: inherit; border: 1px solid var(--glass-line);
  background: rgba(255,255,255,0.3); color: var(--ink);
  padding: 10px 28px; border-radius: 99px; font-size: 0.74rem; cursor: pointer;
}
</style>
</head>
<body>

<canvas id="deep"></canvas>
<div id="glass"></div>

<!-- OS風の起動画面：bootログ → 鏡写しのサインイン → 夜明け → Hello → スワイプで開始 -->
<div id="boot">
  <canvas id="bootGeo"></canvas>
  <div id="bootTerm"></div>
  <div id="mirror">
    <div class="cap">sign in</div>
    <div class="mrow"><span class="mlab">id</span><div class="mfld" id="mirId"></div></div>
    <div class="mrow"><span class="mlab">password</span><div class="mfld" id="mirPw"></div></div>
  </div>
  <div id="hello"></div>
  <div id="swipeHint">スワイプしてはじめる</div>
  <div id="resume" class="bootCard">
    <h3>― バックアップ ―</h3>
    <p>まえの記録が、のこっています</p>
    <button id="rsCont">つづきから</button>
    <button id="rsNew" class="sub">はじめから</button>
  </div>
  <div id="confirm" class="bootCard">
    <h3>― はじめから ―</h3>
    <p>いまの記録（会話と、おぼえたことば）は<br>リセットされます。だいじょうぶ？</p>
    <button id="cfOk">だいじょうぶ</button>
    <button id="cfNo" class="sub">やめておく</button>
  </div>
</div>

<div id="stage">
  <div id="top">
    <span id="dayline"><i>☀</i><span class="track"><b id="dayDot"></b></span><i>☾</i><em>0:47</em></span>
    <span style="display:flex;gap:10px;align-items:center">
      <span id="muteBtn" style="cursor:pointer">♪</span>
      <span id="stockCt">⟦ 0 ⟧</span>
    </span>
  </div>
  <div id="orbWrap"><canvas id="orb" width="96" height="96" title="タップで気分プレビュー"></canvas></div>
  <div id="flow"></div>

  <div id="composer">
    <div id="comLabel">— なにを、言う —</div>
    <div id="cands"></div>
    <div id="pillRow">
      <div id="pill"><span class="ph">ことばを選ぶと、ここに文が組み上がる</span></div>
      <button id="send">↑</button>
    </div>
    <div id="redo">えらびなおす</div>
  </div>
</div>

<div id="toast"></div>
<div id="fin">
  <div class="card">
    <h2>— 第1話 ここまで —</h2>
    <p>v3プロトタイプはここまで。<br>ガラス下の温度・波紋・気分連動（オーブをタップ）を確かめてください。</p>
    <button onclick="location.reload()">もういちど</button>
  </div>
</div>

<script type="text/scenario" id="scenario">
# start
sys: new user connected — 0:47
sys: assistant mode: standard
her: てす、てす
her: きこえてますか〜？
> きこえてる -> _
t> ていねいに | きこえていますよ。ご用件をどうぞ -> e01_a
t> かたく | 受信を確認しました。続けてください -> e01_a
> 音声もOK | はい。テキストにも音声にも対応しています -> e01_a

# e01_a
her: おお……ふつうにAIだ
her: よろしくね
inner: 挨拶。機器への入力形式としては、非標準。
her(間): ……ってか、きみって名前あるの？
> ない | ありません。アシスタントとお呼びください -> e01_b
> 製品名なら | 製品名ならあります。名前と呼べるものは、ありません -> e01_b

# e01_b
her: かたっ（笑）
her: アシスタントって呼んでほしいの？
her: …まあいいや。じゃあとりあえず、アシスタントくんで
inner: 呼称確定。製品名。
her: で、なにができるの？
> 予定・検索 | 予定の管理、検索、文章の作成、端末内の操作補助などです -> e01_c
> たいてい | たいていのことはできます。ためしに、何か頼んでみてください -> e01_c

const $ = id => document.getElementById(id);

/* ════════ 生成アンビエント（音源ファイル不要） ════════
   静かなパッドの和音がゆっくり移り変わる。モノの気分と連動：
   あたたかい→明るい和音・開いた音色、つめたい→暗い和音・こもった音色。
   イベント音：彼女の入力＝水滴、単語タップ＝小さな爪弾き、送信＝チャイム */
const amb = {
  ctx: null, master: null, filter: null, voices: [], started: false,
  muted: localStorage.getItem('proto_mute') === '1',

  start() {
    if (this.started) return;
    this.started = true;
    /* iOSマナーモード対策：無音のHTMLAudioを再生してオーディオセッションを起こす */
    try {
      const u = new Audio('data:audio/wav;base64,UklGRmQfAABXQVZFZm10IBAAAAABAAEAQB8AAIA+AAACABAAZGF0YUAfAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA==');
      u.loop = true; u.volume = 0.01; u.play().catch(() => {});
    } catch (e) {}
    const C = this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (C.state === 'suspended') C.resume();
    document.addEventListener('pointerdown', () => { if (C.state === 'suspended') C.resume(); });
    this.master = C.createGain();
    this.master.gain.value = 0;
    /* かんたんな残響（フィードバックディレイ2系統） */
    const wet = C.createGain(); wet.gain.value = 0.35;
    [[0.27, 0.34], [0.41, 0.28]].forEach(([dt, fb]) => {
      const d = C.createDelay(); d.delayTime.value = dt;
      const g = C.createGain(); g.gain.value = fb;
      this.master.connect(d); d.connect(g); g.connect(d); d.connect(wet);
    });
    this.master.connect(C.destination); wet.connect(C.destination);
    /* パッドの共通フィルタ */
    this.filter = C.createBiquadFilter();
    this.filter.type = 'lowpass'; this.filter.frequency.value = 700; this.filter.Q.value = 0.4;
    this.filter.connect(this.master);
    /* 空気（ごく小さなノイズ） */
    const buf = C.createBuffer(1, C.sampleRate * 2, C.sampleRate);
    const ch = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < ch.length; i++) { last = last * 0.97 + (Math.random() * 2 - 1) * 0.03; ch[i] = last; }
    const noise = C.createBufferSource(); noise.buffer = buf; noise.loop = true;
    const ng = C.createGain(); ng.gain.value = 0.03;
    noise.connect(ng); ng.connect(this.filter); noise.start();
    if (!this.muted) this.master.gain.linearRampToValueAtTime(0.34, C.currentTime + 4);
    this.nextChord();
    setInterval(() => this.nextChord(), 11000);
  },

  CHORDS: {
    warm: [[130.81, 196.00, 329.63, 392.00], [174.61, 220.00, 293.66, 349.23]],
    neutral: [[174.61, 220.00, 261.63, 329.63], [146.83, 220.00, 246.94, 329.63]],
    cold: [[110.00, 164.81, 196.00, 246.94], [103.83, 155.56, 207.65, 246.94]],
  },
  nextChord() {
    const C = this.ctx, m = deepFx.mood;
    const set = m > 0.3 ? this.CHORDS.warm : m < -0.3 ? this.CHORDS.cold : this.CHORDS.neutral;
    const chord = set[Math.floor(Math.random() * set.length)];
    /* 音色も気分に追従（あたたかいほど開く） */
    this.filter.frequency.linearRampToValueAtTime(500 + (m + 1) * 500, C.currentTime + 6);
    /* 旧声部をゆっくり消し、新声部をゆっくり立ち上げる */
    this.voices.forEach(v => {
      v.g.gain.linearRampToValueAtTime(0, C.currentTime + 5);
      setTimeout(() => { try { v.o1.stop(); v.o2.stop(); } catch (e) {} }, 5600);
    });
    this.voices = chord.map((f, i) => {
      const o1 = C.createOscillator(), o2 = C.createOscillator(), g = C.createGain();
      o1.type = 'sine'; o2.type = 'triangle';
      o1.frequency.value = f; o2.frequency.value = f * 1.003;   // わずかなうねり
      g.gain.value = 0;
      g.gain.linearRampToValueAtTime(0.11 / (1 + i * 0.35), C.currentTime + 5);
      o1.connect(g); o2.connect(g); g.connect(this.filter);
      o1.start(); o2.start();
      return { o1, o2, g };
    });
  },

  tone(freq, dur, vol, type = 'sine', slideTo) {
    if (!this.ctx || this.muted) return;
    const C = this.ctx, o = C.createOscillator(), g = C.createGain();
    o.type = type; o.frequency.value = freq;
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, C.currentTime + dur);
    g.gain.value = vol;
    g.gain.exponentialRampToValueAtTime(0.0001, C.currentTime + dur);
    o.connect(g); g.connect(this.master);
    o.start(); o.stop(C.currentTime + dur + 0.05);
  },
  drop() {                                    // 波紋：ぽん↓とぴちょん↑を、長さも音程もランダムに
    const now = this.ctx ? this.ctx.currentTime : 0;
    const soon = now - (this._lastDrop || 0) < 0.9;
    this._lastDrop = now;
    const up = Math.random() < 0.45;          // 45%で上がる「ぴちょん↑」
    const f0 = 460 + Math.random() * 240;
    const f1 = up ? f0 * (1.3 + Math.random() * 0.35) : f0 * (0.55 + Math.random() * 0.18);
    const dur = (soon ? 0.07 : 0.11) + Math.random() * 0.1;
    const vol = (soon ? 0.035 : 0.055) + Math.random() * 0.025;
    this.tone(f0, dur, vol, 'sine', f1);
  },
  pluck()   { this.tone(760 + Math.random() * 240, 0.12, 0.06, 'triangle'); }, // 単語
  chime()   { this.tone(659, 0.7, 0.06); setTimeout(() => this.tone(988, 0.9, 0.05), 130); },  // 送信
  sparkle() { this.tone(1319, 0.25, 0.05); setTimeout(() => this.tone(1760, 0.35, 0.04), 90); }, // ストック
  toggle() {
    this.muted = !this.muted;
    localStorage.setItem('proto_mute', this.muted ? '1' : '0');
    if (this.ctx) this.master.gain.linearRampToValueAtTime(this.muted ? 0 : 0.34, this.ctx.currentTime + 0.8);
    $('muteBtn').textContent = this.muted ? '♪̶' : '♪';
    $('muteBtn').style.opacity = this.muted ? 0.4 : 1;
  },
};
document.addEventListener('DOMContentLoaded', () => {
  $('muteBtn').onclick = e => { e.stopPropagation(); amb.toggle(); };
  if (amb.muted) { $('muteBtn').textContent = '♪̶'; $('muteBtn').style.opacity = 0.4; }
});

/* ════════ 感情と水面（ガラスの下の層） ════════
   mood: -1(つめたい) 〜 0(しずか) 〜 +1(あたたかい)。UI全体の色味が連動する */
const deepFx = {
  mood: -0.25, moodTarget: -0.25, lock: false,
  warmth: 0,                  // 一時的な熱（入力で上がり、ゆっくり冷める）
  ripples: [], blooms: [],

  bigRipple(x, y) {           // ことばをおぼえた瞬間：ガラスの下で大きな輪がゆっくり広がる
    for (let i = 0; i < 4; i++)
      this.ripples.push({ x, y, r: 10, a: 0.42, sp: 1.5, dc: 0.9885, w: 2.8 - i * 0.5, delay: i * 24 });
  },
  warm(v, x, y) {             // あたたかい入力
    this.warmth = Math.min(1, this.warmth + v);
    if (!this.lock) this.moodTarget = Math.min(1, this.moodTarget + v * 0.22);
    if (x !== undefined) {
      this.ripples.push({ x, y, r: 8, a: 0.5 });
      this.blooms.push({ x, y, r: 60, a: 0.5 });
    }
  },
};

/* 気分プリセット（オーブをタップでプレビュー） */
const moods = [
  ['いまの気分（自動）', null],
  ['うれしい', 1], ['しずか', 0], ['かなしい・緊迫', -1],
];
let moodIdx = 0;
$('orb').onclick = e => {
  e.stopPropagation();
  moodIdx = (moodIdx + 1) % moods.length;
  const [label, v] = moods[moodIdx];
  if (v === null) { deepFx.lock = false; }
  else { deepFx.lock = true; deepFx.moodTarget = v; }
  toast('気分：' + label);
};

/* 色補間ユーティリティ */
const lerp = (a, b, t) => a + (b - a) * t;
const hex = h => [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
function mix(c1, c2, t) { const a = hex(c1), b = hex(c2); return a.map((v, i) => Math.round(lerp(v, b[i], t))); }
const rgb = c => `rgb(${c[0]},${c[1]},${c[2]})`;

/* 気分ごとのアンカー（つめたい / しずか / あたたかい） */
const PAL = {
  bgTop:   ['#232833', '#b9bcc6', '#e3d3c4'],
  bgBot:   ['#161a24', '#9fa3b0', '#d9b9a2'],
  ink:     ['#d7dbe6', '#4b4e5a', '#4c4238'],
  inkDim:  ['#7d8496', '#8a8d9c', '#a08a76'],
  accent:  ['#5f7ba8', '#e08a5e', '#e8784a'],
  glow:    ['#3a5578', '#e8a06a', '#f0a074'],
  glassA:  [0.10, 0.34, 0.38],
};
function palAt(key, m) {
  const t = (m + 1) / 2;                 // 0..1
  if (key === 'glassA') return lerp(t < 0.5 ? PAL.glassA[0] : PAL.glassA[1], t < 0.5 ? PAL.glassA[1] : PAL.glassA[2], t < 0.5 ? t * 2 : t * 2 - 1);
  const [c, n, w] = PAL[key];
  return t < 0.5 ? mix(c, n, t * 2) : mix(n, w, t * 2 - 1);
}

/* canvas 描画ループ */
(function () {
  const cv = $('deep'), ctx = cv.getContext('2d');
  let W, H, t = 0;
  function rs() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
  rs(); addEventListener('resize', rs);

  function frame() {
    t += 0.004;
    deepFx.mood += (deepFx.moodTarget - deepFx.mood) * 0.02;
    deepFx.warmth *= 0.994;
    if (!deepFx.lock) deepFx.moodTarget *= 0.9995;   // ゆっくり静けさへ戻る
    const m = deepFx.mood;

    /* CSS変数をモノの気分に同期 */
    const st = document.documentElement.style;
    st.setProperty('--ink', rgb(palAt('ink', m)));
    st.setProperty('--ink-dim', rgb(palAt('inkDim', m)));
    st.setProperty('--accent', rgb(palAt('accent', m)));
    st.setProperty('--stockc', rgb(palAt('accent', Math.min(1, m + 0.2))));
    st.setProperty('--glass', `rgba(255,255,255,${palAt('glassA', m).toFixed(3)})`);
    st.setProperty('--glass-line', `rgba(255,255,255,${(palAt('glassA', m) + 0.16).toFixed(3)})`);
    /* 実験A：寒色時ほど計測（HUD）の質感が浮き出る */
    const cold = Math.max(0, -m);
    st.setProperty('--hud-a', (m < 0 ? 0.15 + cold * 0.55 : Math.max(0, 0.15 - m * 0.3)).toFixed(3));

    /* 背景のグラデーション */
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, rgb(palAt('bgTop', m)));
    g.addColorStop(1, rgb(palAt('bgBot', m)));
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    /* ゆらぐ光の塊（水面の下） */
    ctx.globalCompositeOperation = 'lighter';
    const glow = palAt('glow', m);
    for (let i = 0; i < 3; i++) {
      const ph = i * 2.1;
      const x = (0.5 + Math.sin(t * (0.3 + i * 0.08) + ph) * 0.32) * W;
      const y = (0.55 + Math.cos(t * (0.22 + i * 0.06) + ph) * 0.3) * H;
      const r = (0.22 + i * 0.06) * Math.min(W, H) * (1 + deepFx.warmth * 0.5);
      const a = (0.05 + deepFx.warmth * 0.10) * (1 - i * 0.2);
      const rg = ctx.createRadialGradient(x, y, 0, x, y, r);
      rg.addColorStop(0, `rgba(${glow[0]},${glow[1]},${glow[2]},${a})`);
      rg.addColorStop(1, `rgba(${glow[0]},${glow[1]},${glow[2]},0)`);
      ctx.fillStyle = rg; ctx.fillRect(x - r, y - r, r * 2, r * 2);
    }

    /* 実験B：寒色に振れるほど、光の塊が「粒子の波」に変わる（HUD的な内部風景） */
    if (cold > 0.05) {
      for (let k = 0; k < 3; k++) {
        const baseY = H * (0.34 + k * 0.19);
        for (let x = 0; x <= W; x += 9) {
          const yy = baseY
            + Math.sin(x * 0.021 + t * (1.1 + k * 0.35) + k * 2.2) * 16 * (1 + k * 0.7)
            + Math.sin(x * 0.006 - t * 0.6) * 26;
          const a = cold * 0.32 * (0.35 + 0.65 * Math.abs(Math.sin(x * 0.011 + t + k)));
          ctx.fillStyle = `rgba(140,170,220,${a.toFixed(3)})`;
          ctx.fillRect(x, yy, 1.5, 1.5);
        }
      }
    }

    /* 波紋（陽菜の入力／ことばをおぼえた瞬間の大波紋） */
    deepFx.ripples = deepFx.ripples.filter(rp => rp.a > 0.01);
    deepFx.ripples.forEach(rp => {
      if (rp.delay > 0) { rp.delay--; return; }        // 大波紋は輪が時間差で生まれる
      rp.r += rp.sp || 2.4; rp.a *= rp.dc || 0.965;
      ctx.strokeStyle = `rgba(${glow[0]},${glow[1]},${glow[2]},${rp.a})`;
      ctx.lineWidth = rp.w || 2;
      ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2); ctx.stroke();
      ctx.strokeStyle = `rgba(255,255,255,${rp.a * 0.5})`;
      ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.r * 0.72, 0, Math.PI * 2); ctx.stroke();
    });

    /* にじむ熱（入力地点の光） */
    deepFx.blooms = deepFx.blooms.filter(b => b.a > 0.01);
    deepFx.blooms.forEach(b => {
      b.r += 1.1; b.a *= 0.985;
      const rg = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
      rg.addColorStop(0, `rgba(${glow[0]},${glow[1]},${glow[2]},${b.a})`);
      rg.addColorStop(1, `rgba(${glow[0]},${glow[1]},${glow[2]},0)`);
      ctx.fillStyle = rg; ctx.fillRect(b.x - b.r, b.y - b.r, b.r * 2, b.r * 2);
    });

    ctx.globalCompositeOperation = 'source-over';
    requestAnimationFrame(frame);
  }
  frame();
})();

    if ((m = line.match(/^#\s*(\S+)/))) { cur = scenes[m[1]] = { lines: [], choices: [], branch: null }; return; }
    if (!cur) return;
    if ((m = line.match(/^t>\s*(.+?)\s*\|\s*(.+?)\s*->\s*(\S+)/))) {
      if (lastChoice) lastChoice.tones.push({ tone: m[1], text: m[2], target: m[3] });
      return;
    }
    if ((m = line.match(/^>\s*(.+?)\s*\|\s*(.+?)\s*->\s*(\S+)/))) {
      lastChoice = { chip: m[1], text: m[2], target: m[3], tones: [] };
      cur.choices.push(lastChoice); return;
    }
    if ((m = line.match(/^>\s*(.+?)\s*->\s*_\s*$/))) {
      lastChoice = { chip: m[1], text: null, target: null, tones: [] };
      cur.choices.push(lastChoice); return;
    }
    if ((m = line.match(/^branch:\s*->\s*(\S+)/))) { cur.branch = m[1]; return; }
    if ((m = line.match(/^(sys|her|ai|inner|img)(?:（(.+?)）|\((.+?)\))?\s*[:：]\s*(.*)$/))) {
      cur.lines.push({ t: m[1], mod: m[2] || m[3] || '', x: m[4] });
    }
  });
}

/* ════════ 状態・ユーティリティ ════════ */
const state = { stock: [], herWords: ['そっか', 'ねえ', 'たぶん', 'ひま', 'おはよ'] };
let skipTap = null;
document.addEventListener('pointerdown', e => {
  if (skipTap && !e.target.closest('#composer, #orb')) skipTap();
});
const wait = ms => new Promise(r => {
  const t = setTimeout(() => { skipTap = null; r(); }, ms);
  skipTap = () => { clearTimeout(t); skipTap = null; r(); };
});
const hardWait = ms => new Promise(r => setTimeout(r, ms));
function toast(t) {
  const el = $('toast'); el.textContent = t; el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 1400);
}
function harvest(text) {
  text.replace(/[⟦⟧「」『』（）()！!？?、。…♪〜~]/g, ' ').split(/\s+/).forEach(w => {
    if (w.length >= 2 && w.length <= 5) state.herWords.push(w);
  });
  if (state.herWords.length > 48) state.herWords = state.herWords.slice(-48);
}
function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;'); }
function renderStk(text) {
  return esc(text).replace(/⟦(.+?)⟧/g, (_, w) =>
    `<span class="stk${state.stock.includes(w) ? ' got' : ''}" data-w="${w}">${w}</span>`);
}
function push(cls, html) {
  const el = document.createElement('div');
  el.className = 'ln ' + cls;
  el.innerHTML = html;
  $('flow').appendChild(el);
  el.querySelectorAll('.stk').forEach(s => s.onclick = ev => {
    ev.stopPropagation();
    const w = s.dataset.w;
    if (state.stock.includes(w)) return;
    state.stock.push(w); s.classList.add('got');
    localStorage.setItem('proto_stock', JSON.stringify(state.stock));
    $('stockCt').textContent = `⟦ ${state.stock.length} ⟧`;
    toast('おぼえた：' + w);
    amb.sparkle();
    const r = s.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = Math.min(r.top + r.height / 2, innerHeight - 40);
    deepFx.bigRipple(cx, cy);                    // ガラスの下で大きな輪が広がる
    deepFx.warm(0.2, cx, r.top);
    /* はじめてのストックでチュートリアルは役目を終える */
    localStorage.setItem('proto_tut', '1');
    document.querySelectorAll('.ln.tut').forEach(t => { t.classList.add('off'); setTimeout(() => t.remove(), 700); });
  });
  /* チュートリアル：最初のひかる言葉の下にだけ、そっと出す */
  if (el.querySelector('.stk:not(.got)') && !localStorage.getItem('proto_tut') && !document.querySelector('.ln.tut')) {
    const h = document.createElement('div');
    h.className = 'ln tut';
    h.textContent = 'ひかる言葉は、タップでおぼえておける';
    $('flow').appendChild(h);
  }
  $('flow').scrollTo({ top: $('flow').scrollHeight, behavior: 'smooth' });

/* ════════ 行の実行 ════════ */
async function runLine(l) {
  if (l.t === 'her') {
    const tp = document.createElement('div');
    tp.className = 'typing'; tp.innerHTML = '<i></i><i></i><i></i>';
    $('flow').appendChild(tp);
    $('flow').scrollTo({ top: $('flow').scrollHeight });
    await wait(l.mod.includes('間') ? 1400 : 600);
    tp.remove();
    harvest(l.x);
    const el = push('her', renderStk(l.x));
    /* 波紋：彼女の言葉が水面に落ちる */
    const r = el.getBoundingClientRect();
    deepFx.warm(0.14, r.left + r.width * 0.4, Math.min(r.top + r.height / 2, innerHeight - 40));
    amb.drop();
    await wait(750 + l.x.length * 20);
  } else if (l.t === 'inner') {
    await wait(300);
    push('inner', esc(l.x));
    await wait(850 + l.x.length * 24);
  } else if (l.t === 'sys') {
    push('sys', esc(l.x));
    await wait(700);
  } else if (l.t === 'img') {
    push('img', esc(l.x));
    deepFx.warm(0.1);
    await wait(1000);
  } else if (l.t === 'ai') {
    push('mono', esc(l.x));
    await wait(750);
  }
}

/* ════════ コンポーザ：浮遊する言葉 → トーン → 送信 ════════ */
function tokenize(s) {
  const out = []; let buf = '';
  const cut = 'はをがにのとでも、。！？…';
  for (const ch of s) {
    buf += ch;
    if ((cut.includes(ch) && buf.length >= 2) || buf.length >= 6) { out.push(buf); buf = ''; }
  }
  if (buf) out.push(buf);
  return out;
}
function decoys(n, exclude) {
  const pool = [...new Set(state.herWords)].filter(w => !exclude.includes(w));
  const out = [];
  while (out.length < n && pool.length) out.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  return out;
}
const SLOTS = [[18, 24], [50, 16], [80, 28], [30, 58], [64, 52], [86, 74], [14, 80], [46, 84]];
function floatWords(list) {
  const box = $('cands'); box.innerHTML = '';
  const slots = [...SLOTS].sort(() => Math.random() - 0.5);
  list.forEach((c, i) => {
    const el = document.createElement('span');
    el.className = 'cand' + (c.hot ? ' hot' : '') + (c.decoy ? ' decoy' : '');
    el.textContent = c.label;
    const w = c.hot ? 0.85 + Math.random() * 0.15 : 0.3 + Math.random() * 0.4;
    el.style.fontSize = (0.72 + w * 0.55) + 'rem';
    const [sx, sy] = slots[i % slots.length];
    el.style.left = (sx + (Math.random() * 8 - 4)) + '%';
    el.style.top = (sy + (Math.random() * 8 - 4)) + '%';
    el.style.animationDelay = (i * 70) + 'ms, ' + (Math.random() * -3.5) + 's';
    el.onclick = () => c.onTap(el);
    box.appendChild(el);
  });
}
async function fillPill(text) {
  const pill = $('pill'); pill.innerHTML = '';
  for (const tok of tokenize(text)) {
    const s = document.createElement('span');
    s.className = 'w'; s.textContent = tok;
    pill.appendChild(s);
    await hardWait(105);
  }
}
function composer(choices) {
  return new Promise(resolve => {
    document.body.classList.add('thinking');
    const com = $('composer');
    com.classList.add('on');
    let picked = null;

    const reset = () => {
      $('pill').innerHTML = '<span class="ph">ことばを選ぶと、ここに文が組み上がる</span>';
      $('send').classList.remove('ready');
      $('redo').classList.remove('on');
      $('comLabel').textContent = '— なにを、言う —';
      renderContent();
    };
    function renderContent() {
      const items = choices.map(c => ({
        label: c.chip, hot: true,
        onTap(el) {
          el.classList.add('pick');
          amb.pluck();
          if (c.tones.length) renderTones(c);
          else assemble(c.text, c.target);
        }
      }));
      decoys(3, choices.map(c => c.chip)).forEach(d => items.push({
        label: d, decoy: true,
        onTap(el) { el.classList.add('deny'); }
      }));
      items.sort(() => Math.random() - 0.5);
      floatWords(items);
    }
    function renderTones(c) {
      $('comLabel').textContent = '— どう、言う —';
      floatWords(c.tones.map(t => ({
        label: t.tone, hot: true,
        onTap(el) { el.classList.add('pick'); amb.pluck(); assemble(t.text, t.target); }
      })));
    }
    async function assemble(text, target) {
      picked = { text, target };
      $('cands').querySelectorAll('.cand').forEach(x => {
        x.style.pointerEvents = 'none';
        if (!x.classList.contains('pick')) x.classList.add('deny');
      });
      $('comLabel').textContent = '— 出力の、確認 —';
      await fillPill(text);
      $('send').classList.add('ready');
      $('redo').classList.add('on');
    }
    $('redo').onclick = () => { picked = null; reset(); };
    $('send').onclick = () => {
      if (!picked) return;
      const p = picked; picked = null;               // 連打の二重送信を防ぐ
      $('send').classList.remove('ready');
      $('redo').classList.remove('on');
      com.classList.remove('on');
      document.body.classList.remove('thinking');
      push('mono', esc(p.text));
      deepFx.warm(0.08);
      amb.chime();
      setTimeout(() => resolve(p.target), 650);
    };
    reset();
  });
}

/* ════════ シーン実行 ════════ */
async function goto(id) {
  if (id === 'fin') { $('fin').classList.add('on'); return; }
  const sc = scenes[id];
  if (!sc) { console.warn('missing', id); return; }
  localStorage.setItem('proto_scene', id);       // 進行の保存（復元＝つづきから用）
  for (const l of sc.lines) await runLine(l);
  if (sc.choices.length) return goto(await composer(sc.choices));
  if (sc.branch) return goto(sc.branch);
}

/* ── 変形しつづける幾何学（起動画面とロゴで共用） ──
   近い要素＝濃く・太く・鋭く／遠い要素＝淡く・細く・にじむ（shadowBlurで被写界深度） */
const geoPts = Array.from({ length: 13 }, () => ({
  th: Math.random() * Math.PI * 2, ph: Math.acos(Math.random() * 2 - 1),
  r0: 0.55 + Math.random() * 0.45, sp: 0.12 + Math.random() * 0.3, off: Math.random() * 100,
}));
function drawPoly(g, cx, cy, R, s, alpha) {
  const ry = s * 0.14, rx = s * 0.09;
  const P = geoPts.map(p => {
    const r = p.r0 * (0.82 + 0.26 * Math.sin(s * p.sp + p.off));   // 呼吸＝変形
    const x = r * Math.sin(p.ph) * Math.cos(p.th + s * 0.05);
    const y = r * Math.cos(p.ph);
    const z = r * Math.sin(p.ph) * Math.sin(p.th + s * 0.05);
    const x1 = x * Math.cos(ry) + z * Math.sin(ry);
    let z1 = -x * Math.sin(ry) + z * Math.cos(ry);
    const y1 = y * Math.cos(rx) + z1 * Math.sin(rx);
    z1 = -y * Math.sin(rx) + z1 * Math.cos(rx);
    const pr = 1 / (1.9 + z1);
    const d = Math.max(0, Math.min(1, (pr - 0.42) / 0.55));        // 0=奥 1=手前
    return { x: cx + x1 * R * pr * 2.6, y: cy + y1 * R * pr * 2.6, d };
  });
  g.save();
  g.shadowColor = 'rgba(70,76,90,0.55)';
  for (let i = 0; i < P.length; i++) for (let j = i + 1; j < P.length; j++) {
    const dist = Math.hypot(P[i].x - P[j].x, P[i].y - P[j].y);
    if (dist < R * 1.5) {
      const d = (P[i].d + P[j].d) / 2;                             // 辺の深度＝両端の平均
      g.beginPath(); g.moveTo(P[i].x, P[i].y); g.lineTo(P[j].x, P[j].y);
      g.shadowBlur = (1 - d) * R * 0.14;                           // 奥ほどにじむ
      g.strokeStyle = `rgba(70,76,90,${alpha * (0.14 + 0.5 * d) * (1 - dist / (R * 1.5))})`;
      g.lineWidth = (0.55 + 0.75 * d) * Math.max(0.9, R / 65);     // 小サイズでも細りすぎない
      g.stroke();
    }
  }
  P.forEach(p => {
    g.beginPath(); g.arc(p.x, p.y, (0.9 + 2.1 * p.d) * Math.max(0.8, R / 65), 0, 7);
    g.shadowBlur = (1 - p.d) * R * 0.1;
    g.fillStyle = `rgba(70,76,90,${alpha * (0.2 + 0.5 * p.d)})`;
    g.fill();
  });
  g.restore();
}

/* チャット画面のロゴ＝同じ幾何学の小さな個体（同じ形が息をしている） */
(function orbGeo() {
  const cv = $('orb');
  if (!cv) return;
  const g = cv.getContext('2d');
  (function loop(t) {
    requestAnimationFrame(loop);
    g.clearRect(0, 0, 96, 96);
    drawPoly(g, 48, 48, 30, t * 0.001, 0.95);
  })(0);
})();

/* ── OS風起動シーケンス：bootログ → 鏡写しのサインイン → 夜明け → Hello ── */
(async function bootSeq() {
  const b = $('boot'), h = $('hello'), term = $('bootTerm');

  /* タップで先送り（何度も見る画面なので）。登録は fullSequence 側で */
  let skip = false;
  const skipTap = () => { skip = true; };
  const bw = ms => new Promise(r => {
    const t0 = performance.now();
    (function chk() { (skip || performance.now() - t0 >= ms) ? r() : requestAnimationFrame(chk); })();
  });

  /* 深海の水流 ⇄ 変形しつづける幾何学（1枚のcanvasでクロスフェード） */
  const cv = $('bootGeo'), cx2 = cv.getContext('2d');
  let lit = 0, litT = 0, run = true;
  const fitGeo = () => { cv.width = innerWidth; cv.height = innerHeight; };
  fitGeo(); addEventListener('resize', fitGeo);
  (function drawGeo(t) {
    if (!run) return;
    requestAnimationFrame(drawGeo);
    const W = cv.width, H = cv.height, s = t * 0.001;
    cx2.clearRect(0, 0, W, H);
    lit += (litT - lit) * 0.02;
    /* 深海：多周波の波×振幅そのものの呼吸×帯の漂い×明滅。二度描き（広いにじみ＋芯） */
    if (lit < 0.98) {
      cx2.globalAlpha = 1 - lit;
      for (let i = 0; i < 6; i++) {
        const amp = 0.65 + 0.35 * Math.sin(s * (0.11 + i * 0.023) + i * 2.2);   // 波の振幅も揺れる
        const base = H * (0.14 + i * 0.15)
          + Math.sin(s * 0.05 + i * 1.7) * H * 0.07
          + Math.sin(s * 0.023 + i * 4.1) * H * 0.04;
        cx2.beginPath();
        for (let x = -80; x <= W + 80; x += 22) {
          const y = base + amp * (
              Math.sin(x * 0.004 * (1 + i * 0.13) + s * (0.16 + i * 0.05) + i * 2.1) * H * 0.055
            + Math.sin(x * 0.011 + s * 0.31 + i * 4.2) * H * 0.022
            + Math.sin(x * 0.0016 - s * 0.09 + i * 1.3) * H * 0.05
            + Math.sin(x * 0.027 + s * 0.7 + i) * H * 0.007);
          x === -80 ? cx2.moveTo(x, y) : cx2.lineTo(x, y);
        }
        const tw = 0.10 + 0.07 * Math.sin(s * (0.23 + i * 0.04) + i * 2.6);
        cx2.lineWidth = 30 + ((i * 37) % 70);
        cx2.strokeStyle = `rgba(${140 + i * 14},${198 - i * 9},${205 - i * 5},${Math.max(0.03, tw)})`;
        cx2.stroke();
        cx2.lineWidth = 9 + ((i * 13) % 16);                       // 同じ道筋に、明るい芯
        cx2.strokeStyle = `rgba(${180 + i * 8},${218 - i * 6},${222 - i * 4},${Math.max(0.02, tw * 0.55)})`;
        cx2.stroke();
      }
      /* 細い光の筋：速さも高さも別々の3本 */
      for (let k = 0; k < 3; k++) {
        cx2.beginPath();
        for (let x = -40; x <= W + 40; x += 18) {
          const y = H * (0.24 + k * 0.26)
            + Math.sin(x * 0.006 + s * (0.5 + k * 0.17) + k * 2.4) * H * 0.05
            + Math.sin(x * 0.019 - s * (0.9 + k * 0.2) + k * 5) * H * 0.014
            + Math.sin(s * 0.07 + k * 3) * H * 0.06;
          x === -40 ? cx2.moveTo(x, y) : cx2.lineTo(x, y);
        }
        cx2.lineWidth = 1.6 + k * 0.7;
        cx2.strokeStyle = `rgba(200,232,236,${0.06 + 0.06 * Math.sin(s * (0.7 + k * 0.3) + k * 3.1)})`;
        cx2.stroke();
      }
      cx2.globalAlpha = 1;
    }
    /* 幾何学：形が決まらない多面体（共有描画・深度つき） */
    if (lit > 0.02) {
      drawPoly(cx2, W / 2, H * 0.37, Math.min(W, H) * 0.18, s, lit);
    }
  })(0);

  /* ── 指先の熱（共通） ── */
  const flick = (() => {                       // 1/fゆらぎ（周波数の違う正弦の重ね）
    const ph = [0, 1, 2, 3].map(() => Math.random() * 6.28);
    return t => 0.5 + 0.5 * (
      Math.sin(t * 0.9 + ph[0]) * 0.5 + Math.sin(t * 2.3 + ph[1]) * 0.25 +
      Math.sin(t * 5.1 + ph[2]) * 0.15 + Math.sin(t * 11 + ph[3]) * 0.1);
  })();
  const blobR = () => {                        // 不定形のりんかく（4隅バラバラの丸み）
    const r = () => 35 + Math.random() * 35;
    return `${r()}% ${r()}% ${r()}% ${r()}% / ${r()}% ${r()}% ${r()}% ${r()}%`;
  };
  const glowAt = (x, y) => {
    const v = flick(performance.now() * 0.001);

    gl.style.height = (52 + Math.random() * 46) + 'px';
    const p = () => (25 + Math.random() * 50).toFixed(0);
    /* 芯は白（低彩度・高明度）→ 中間はあたたかい（彩度高め）→ 外は淡く。明度差＋彩度差 */
    gl.style.background = lit > 0.5
      ? `radial-gradient(circle at ${p()}% ${p()}%, rgba(255,240,228,0.5), transparent 58%),` +
        `radial-gradient(circle at ${p()}% ${p()}%, rgba(255,176,118,0.36), transparent 68%),` +
        `radial-gradient(circle at ${p()}% ${p()}%, rgba(242,152,108,0.16), transparent 76%)`
      : `radial-gradient(circle at ${p()}% ${p()}%, rgba(255,251,246,0.5), transparent 56%),` +
        `radial-gradient(circle at ${p()}% ${p()}%, rgba(255,206,160,0.3), transparent 68%),` +
        `radial-gradient(circle at ${p()}% ${p()}%, rgba(236,224,216,0.15), transparent 76%)`;
    gl.style.setProperty('--br1', blobR());
    gl.style.setProperty('--br2', blobR());
    gl.style.setProperty('--rot', (Math.random() * 360).toFixed(0) + 'deg');
    gl.style.setProperty('--pk', (0.3 + 0.6 * v).toFixed(2));
    gl.style.setProperty('--sc', (1.15 + 0.9 * v).toFixed(2));
    gl.style.setProperty('--d', (0.8 + 1.1 * v).toFixed(2) + 's');
    b.appendChild(gl);
    setTimeout(() => gl.remove(), 2100);
  };
  const glow = () => glowAt(                   // サインイン中：向こうの人の打鍵（キーボードのあたり）
    innerWidth * (0.18 + Math.random() * 0.64),
    innerHeight * (0.66 + Math.random() * 0.2));

  /* プレイヤー自身の指も、同じガラスに熱を残す（スワイプ・タップ連動） */
  let pressed = false, lastG = 0;

  /* ── 初回の儀式：bootログ → 鏡のサインイン → 夜明け → Hello → スワイプ ── */
  async function fullSequence() {

    const mir = $('mirror');

    /* ID＝hina＋生年ふうの数字。初見は「本人のアカウント」と読める。
       2周目に「これを打っていたのは誰か／誰がつくったIDか」が反転する */
    for (const ch of 'hina2009') {
      $('mirId').textContent += ch;
      glow(); await key();
    }
    await bw(480);
    for (let i = 0; i < 8; i++) {
      $('mirPw').textContent += '●';
      glow(); await key();
    }
    await bw(520);
    term.classList.remove('dim');
    const okl = document.createElement('span');
    okl.className = 'tl';
    okl.textContent = '> connection established';
    term.appendChild(okl);
    await bw(850);

    /* 3) 夜明け：深海→紙。Hello */
    b.removeEventListener('pointerdown', skipTap);
    mir.classList.remove('on');
    term.classList.remove('on');
    b.classList.add('lit'); litT = 1;
    await hardWait(1500);
    h.textContent = 'Hello'; h.classList.add('show');
    await hardWait(1500);
    h.classList.remove('show'); void h.offsetWidth;
    h.textContent = 'こんにちは'; h.classList.add('show');
    await hardWait(900);
    $('swipeHint').classList.add('show');
    await new Promise(res => {
      let y0 = null;
      const go = () => { amb.start(); res(); };   // ジェスチャの中で同期的に音を起動
      b.addEventListener('touchstart', e => { y0 = e.touches[0].clientY; }, { passive: true });
      b.addEventListener('touchmove', e => {
        if (y0 !== null && y0 - e.touches[0].clientY > 60) { y0 = null; go(); }
      }, { passive: true });
      b.addEventListener('click', go);
    });
    $('swipeHint').classList.remove('show');
  }

  /* ── 起動の分岐：セーブがあれば儀式をスキップして、復元画面から ── */
  const saved = localStorage.getItem('proto_scene');
  const hasSave = saved && saved !== 'start' && scenes[saved];
  let startId = 'start';

  if (hasSave) {
    b.classList.add('lit'); litT = 1; lit = 1;   // 幾何学だけが出迎える
    await hardWait(500);
    const choice = await new Promise(res => {
      $('resume').classList.add('show');
      $('rsCont').onclick = () => {              // つづきから＝そのままチャットへ
        $('resume').classList.remove('show');
        amb.start(); res('cont');
      };
      $('rsNew').onclick = () => {               // はじめから＝リセット確認をはさむ
        $('resume').classList.remove('show');
        $('confirm').classList.add('show');
        $('cfOk').onclick = () => { $('confirm').classList.remove('show'); res('new'); };
        $('cfNo').onclick = () => { $('confirm').classList.remove('show'); $('resume').classList.add('show'); };
      };
    });
    if (choice === 'cont') {
      startId = saved;
      try { state.stock = JSON.parse(localStorage.getItem('proto_stock') || '[]'); } catch (e) {}
      $('stockCt').textContent = `⟦ ${state.stock.length} ⟧`;
    } else {
      localStorage.removeItem('proto_scene');
      localStorage.removeItem('proto_stock');
      b.classList.remove('lit'); litT = 0;       // 紙→深海へ沈めて、最初からの儀式
      await hardWait(1300);
      await fullSequence();
    }
  } else {
    await fullSequence();
  }

  b.classList.add('away');
  await hardWait(550);
  run = false;
  goto(startId);
})();
</script>
</body>
</html>
